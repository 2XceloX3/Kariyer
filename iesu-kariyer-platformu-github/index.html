};
const mergeHeroSettings = (settings) => ({ ...DEFAULT_HERO_SETTINGS, ...(settings || {}) });
const SESSION_KEY = 'iesu_user_session';
const SESSION_META_KEY = 'iesu_session_meta';
const SESSION_TIMEOUTS = { admin: 20 * 60 * 1000, student: 90 * 60 * 1000, alumni: 90 * 60 * 1000 };
const getActiveSession = () => {
  try {
    localStorage.removeItem('iesu_user');
    const rawUser = sessionStorage.getItem(SESSION_KEY);
    const rawMeta = sessionStorage.getItem(SESSION_META_KEY);
    if (!rawUser || !rawMeta) return null;
    const user = JSON.parse(rawUser);
    const meta = JSON.parse(rawMeta);
    const timeout = SESSION_TIMEOUTS[user.role] || SESSION_TIMEOUTS.student;
    if (Date.now() - (meta.lastActive || 0) > timeout) {
      sessionStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(SESSION_META_KEY);
      return null;
    }
    return user;
  } catch(e) {
    return null;
  }
};
const saveActiveSession = (user) => {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
  sessionStorage.setItem(SESSION_META_KEY, JSON.stringify({ lastActive: Date.now() }));
};
const touchActiveSession = (user) => {
  if (user) sessionStorage.setItem(SESSION_META_KEY, JSON.stringify({ lastActive: Date.now() }));
};
const clearActiveSession = () => {
  sessionStorage.removeItem(SESSION_KEY);
  sessionStorage.removeItem(SESSION_META_KEY);
  localStorage.removeItem('iesu_user');
};
const getScopedStorageKey = (prefix, user) => {
  const identity = String(user?.email || user?.role || 'guest').toLocaleLowerCase('tr-TR').replace(/[^a-z0-9@._-]/gi, '_');

const normalizeHex = (hex, fallback = '#0f766e') => {
  const clean = String(hex || '').trim();
  if (/^#[0-9a-f]{6}$/i.test(clean)) return clean;
  if (/^#[0-9a-f]{3}$/i.test(clean)) return `#${clean[1]}${clean[1]}${clean[2]}${clean[2]}${clean[3]}${clean[3]}`;
  return fallback;
};
const hexToRgb = (hex) => {
  const clean = normalizeHex(hex).slice(1);
  return { r: parseInt(clean.slice(0, 2), 16), g: parseInt(clean.slice(2, 4), 16), b: parseInt(clean.slice(4, 6), 16) };
};
const rgbToHex = ({ r, g, b }) => `#${[r, g, b].map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0')).join('')}`;
const mixHex = (base, overlay, overlayAmount) => {
  const a = hexToRgb(base);
  const b = hexToRgb(overlay);
  const w = Math.max(0, Math.min(1, overlayAmount));
  return rgbToHex({ r: a.r * (1 - w) + b.r * w, g: a.g * (1 - w) + b.g * w, b: a.b * (1 - w) + b.b * w });
};
const buildBrandScale = (primary) => {
  const base = normalizeHex(primary);
  return {
    50: mixHex('#ffffff', base, 0.08),
    100: mixHex('#ffffff', base, 0.16),
    200: mixHex('#ffffff', base, 0.28),
    300: mixHex('#ffffff', base, 0.42),
    400: mixHex('#ffffff', base, 0.62),
    500: base,
    600: mixHex(base, '#000000', 0.14),
    700: mixHex(base, '#000000', 0.28),
    800: mixHex(base, '#000000', 0.42),
    900: mixHex(base, '#000000', 0.58),
    950: mixHex(base, '#000000', 0.72)
  };
};

const translateAutoText = (value, language) => {

const useLanguageDomTranslator = (language) => {
  useEffect(() => {
    if (typeof document === 'undefined') return;
    const root = document.getElementById('root');
    if (!root) return;
    let busy = false;
    const apply = () => {
      if (busy) return;
      busy = true;
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          const parent = node.parentElement;
          if (!parent || ['SCRIPT','STYLE','TEXTAREA','OPTION'].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
          const text = node.textContent || '';
          if (!text.trim() || text.trim().length > 90) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(node => {
        if (!node.__iesuOriginalText) node.__iesuOriginalText = node.textContent;
        const original = node.__iesuOriginalText;
        const next = language === 'tr' ? original : translateAutoText(original, language);
        if (node.textContent !== next) node.textContent = next;
      });
      root.querySelectorAll('[placeholder], [title], [aria-label]').forEach(el => {
        ['placeholder','title','aria-label'].forEach(attr => {
          if (!el.hasAttribute(attr)) return;
          const key = `iesuOriginal${attr.replace(/[^a-z]/gi, '')}`;
          if (!el.dataset[key]) el.dataset[key] = el.getAttribute(attr) || '';
          const original = el.dataset[key];
          const next = language === 'tr' ? original : translateAutoText(original, language);
          if (el.getAttribute(attr) !== next) el.setAttribute(attr, next);
        });
      });
      busy = false;
    };
    apply();
    const observer = new MutationObserver(() => window.requestAnimationFrame(apply));
    observer.observe(root, { childList: true, subtree: true });
    window.addEventListener('iesu-translations-updated', apply);
    return () => {
      observer.disconnect();
      window.removeEventListener('iesu-translations-updated', apply);
    };
  }, [language]);
};

const processSyncQueue = async () => {
  if (!navigator.onLine) return;
  const queue = getStoredArray('iesu_offline_queue', []);
  if (!queue.length) return;
  
  let updatedQueue = [...queue];
  let hasChanges = false;
  
  for (let i = 0; i < queue.length; i++) {
    const item = queue[i];
    if (item.syncAttempts >= MAX_RETRY_ATTEMPTS) continue;
    
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'logError', data: item }),
      });
      const result = await response.json();
      if (result.success) {
        updatedQueue = updatedQueue.filter(q => q.id !== item.id);
        hasChanges = true;
      } else {
        item.syncAttempts++;
        item.lastSyncError = result.error;
        hasChanges = true;
      }
    } catch (e) {
      item.syncAttempts++;
      item.lastSyncError = e.message;
      hasChanges = true;
    }
  }
  
  if (hasChanges) {
    localStorage.setItem('iesu_offline_queue', JSON.stringify(updatedQueue));
  }
};

  const source = isPlainObject(cv) ? cv : {};
  const personal = ensurePlainObject(source.personal, {});
  const legacySkills = typeof source.skillsText === 'string' ? source.skillsText.split(/[,\n;]/).map(v => v.trim()).filter(Boolean) : [];
  const normalized = {
    ...base,
    ...source,
    personal: { ...base.personal, ...personal },
    experience: ensureArray(source.experience, ensureArray(source.experiences, [])),
    education: ensureArray(source.education, base.education),
    skills: ensureArray(source.skills, legacySkills),
    certificates: ensureArray(source.certificates, []),
    projects: ensureArray(source.projects, []),
    volunteering: ensureArray(source.volunteering, []),
    leadership: ensureArray(source.leadership, [])
  };
  if (normalized.personal?.title !== undefined) delete normalized.personal.title;
  return normalized;
};
const getCvDataForUser = (user) => {
  const scoped = getScopedStorageKey('iesu_cv_data', user);
  const direct = getStoredJson(scoped, null);
  if (direct) return normalizeCvData(direct, user);
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('iesu_cv_data_')) {
        const item = JSON.parse(localStorage.getItem(key) || '{}');
        if (item?.personal?.email && user?.email && String(item.personal.email).toLocaleLowerCase('tr-TR') === String(user.email).toLocaleLowerCase('tr-TR')) return normalizeCvData(item, user);
      }
    }
  } catch(e) {}
  return null;
};
const getCvCompletion = (cv) => {
  if (!cv) return 0;
  const safeCv = normalizeCvData(cv);
  const checks = [
    !!safeCv.personal?.name, !!safeCv.personal?.email, !!safeCv.personal?.phone, !!safeCv.personal?.about,
    safeCv.education.length > 0, safeCv.experience.length > 0,
    safeCv.skills.length >= 3, safeCv.certificates.length > 0,
    safeCv.projects.length > 0, safeCv.leadership.length > 0
  ];
  return Math.round((checks.filter(Boolean).length / checks.length) * 100);
};

const filterPoolRecords = (records, filters = {}) => records.filter(item => {
  const haystack = `${item.name || ''} ${item.email || ''} ${item.phone || ''} ${item.studentNumber || ''} ${(item.departments || []).join(' ')} ${item.tags?.join(' ') || ''} ${item.company || ''} ${item.position || ''} ${item.sector || ''} ${item.graduationYear || ''} ${item.employmentStatus || ''}`.toLocaleLowerCase('tr-TR');
  if (filters.search && !haystack.includes(filters.search.toLocaleLowerCase('tr-TR'))) return false;
  if (filters.department && !(item.departments || []).some(dep => dep === filters.department)) return false;
  if (filters.faculty && item.faculty !== filters.faculty) return false;
  if (filters.classYear && item.classYear !== filters.classYear) return false;
  if (filters.educationType && item.educationType !== filters.educationType) return false;
  if (filters.graduationYear && String(item.graduationYear || '') !== String(filters.graduationYear)) return false;
  if (filters.employmentStatus && item.employmentStatus !== filters.employmentStatus) return false;
  if (filters.sector && item.sector !== filters.sector) return false;
  if (filters.cvStatus === 'withCv' && !item.cvData) return false;
  if (filters.cvStatus === 'missingCv' && item.cvData) return false;
  if (filters.profileStatus === 'missing' && item.cvCompletion >= 70) return false;
  if (filters.profileStatus === 'complete' && item.cvCompletion < 70) return false;
  if (filters.academic === 'doubleMajor' && !item.secondDepartment) return false;
  if (filters.academic === 'minor' && !item.minor && !item.minorDepartment) return false;
  if (filters.status && filters.status !== 'all' && item.status !== filters.status) return false;
  return true;
});

const getSavedPassword = (item = {}, keys = []) => {
  const allKeys = [...keys, 'password', 'sifre', 'şifre', 'parola', 'pass', 'panelPassword', 'companyPassword', 'accessPassword'];
  for (const key of allKeys) {
    const value = item?.[key];
    if (value !== undefined && value !== null && String(value).trim()) return String(value).trim();
  }
  return '';
};
const passwordMatches = (item = {}, typedPassword = '', keys = []) => {
  const typed = String(typedPassword || '').trim();

  return !!typed && !!saved && saved === typed;

const resolveRegisteredUserLogin = (email, password) => {
  const cleanEmail = String(email || '').trim().toLocaleLowerCase('tr-TR');
  const cleanPassword = String(password || '').trim();
  const users = getRegisteredUsers();
  const found = users.find(u => String(u.email || '').trim().toLocaleLowerCase('tr-TR') === cleanEmail);
  if (!found || !cleanPassword) return { user: null, passwordBound: false, reason: found ? 'empty-password' : 'missing-user' };
  if (passwordMatches(found, cleanPassword, ['studentPassword', 'alumniPassword', 'temporaryPassword'])) return { user: found, passwordBound: false };
  const savedPassword = getSavedPassword(found, ['studentPassword', 'alumniPassword', 'temporaryPassword']);
  if (!savedPassword) {
    const patched = { ...found, password: cleanPassword, passwordRecoveredAt: new Date().toISOString() };
    setStoredJson('iesu_users_db', users.map(item => getProfileKey(item) === getProfileKey(found) ? patched : item));
    return { user: patched, passwordBound: true };
  }
  return { user: null, passwordBound: false, reason: 'password-mismatch' };
};

const csvEscape = (value) => `"${String(value ?? '').replace(/"/g, '""')}"`;
const downloadCsv = (filename, headers, rows) => {
  const csv = [headers.map(csvEscape).join(';'), ...rows.map(row => row.map(csvEscape).join(';'))].join('\n');
  const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(link.href), 800);
};

const getStudentClassNumber = (user) => {

};
const isAssociateStudent = (user) => {

};
const getStudyLengthYears = (user) => {
  const text = `${user?.educationType || ''} ${getUserDepartments(user).join(' ')}`.toLocaleLowerCase('tr-TR');

const getGraduationReviewDate = (year = new Date().getFullYear()) => new Date(year, GRADUATION_REVIEW_MONTH, GRADUATION_REVIEW_DAY);

const markGraduationAsked = (user) => {
  const key = getGraduationReviewKey(user);
  const reviews = getGraduationReviews();
  if (!reviews[key] || reviews[key].status !== 'asked') reviews[key] = { status: 'asked', askedAt: new Date().toISOString() };
  saveGraduationReviews(reviews);
};
const markGraduationDeferred = (user) => {
  const reviews = getGraduationReviews();
  reviews[getGraduationReviewKey(user)] = { status: 'deferred', deferredUntilYear: new Date().getFullYear() + 1, updatedAt: new Date().toISOString() };
  saveGraduationReviews(reviews);
};
const markGraduationCompleted = (user, source = 'auto') => {
  const reviews = getGraduationReviews();
  reviews[getGraduationReviewKey(user)] = { status: 'completed', source, completedAt: new Date().toISOString() };
  saveGraduationReviews(reviews);
};
const getGraduationAutomationStatus = (user, now = new Date()) => {
  if (!user || user.role !== 'student') return { eligible: false };
  const requiredYears = getStudyLengthYears(user);
  const classNumber = getStudentClassNumber(user);
  if (!classNumber || classNumber < requiredYears) return { eligible: false, requiredYears, classNumber };
  if (now < getGraduationReviewDate(now.getFullYear())) return { eligible: false, requiredYears, classNumber };
  const review = getGraduationReviews()[getGraduationReviewKey(user)] || null;
  if (review?.status === 'completed') return { eligible: false, requiredYears, classNumber };
  if (review?.status === 'deferred' && Number(review.deferredUntilYear || 0) > now.getFullYear()) return { eligible: false, requiredYears, classNumber };
  const askedAt = review?.askedAt ? new Date(review.askedAt) : null;
  const daysWaiting = askedAt ? Math.floor((now - askedAt) / (1000 * 60 * 60 * 24)) : 0;
  return { eligible: true, requiredYears, classNumber, shouldAsk: true, shouldAuto: !!askedAt && daysWaiting >= GRADUATION_AUTO_AFTER_DAYS, daysWaiting };
};
const transferStudentToAlumni = (user, source = 'auto') => {

    ...user,
    role: 'alumni',
    roleTitle: 'Mezun',
    graduationYear: user?.graduationYear || String(new Date().getFullYear()),
    employmentStatus: user?.employmentStatus || 'Yeni mezun',

    graduationTransferSource: source
  };
  const key = getProfileKey(user);
  const users = getRegisteredUsers();
  const found = users.some(item => getProfileKey(item) === key);
  const nextUsers = found ? users.map(item => getProfileKey(item) === key ? { ...item, ...upgraded, password: item.password } : item) : [...users, upgraded];
  setStoredJson('iesu_users_db', nextUsers);
  markGraduationCompleted(upgraded, source);
  return upgraded;
};

const getSurveyAnswerDetails = (record) => {
  if (Array.isArray(record?.answerDetails)) return record.answerDetails;
  if (record?.scores && record?.questions) {
    return record.questions.map((question, i) => ({ question, score: record.scores[i] || record.scores[String(i)] || '' }));
  }
  return String(record?.answers || '').split('|').map(item => {
    const parts = item.split(':');
    const score = parts.pop()?.trim() || '';
    return { question: parts.join(':').trim(), score };
  }).filter(item => item.question || item.score);
};

const getCompatiblePrograms = (department, type = 'cap') => {
  const source = type === 'minor' ? MINOR_COMPATIBILITY : DOUBLE_MAJOR_COMPATIBILITY;
  const key = Object.keys(source).find(name => normalizeProgramName(name) === normalizeProgramName(department));
  return key ? source[key] : [];
};
const isCompatibleSecondProgram = (department, secondDepartment, type = 'cap') => {
  if (!department || !secondDepartment) return null;
  const options = getCompatiblePrograms(department, type);
  if (!options.length) return null;
  return options.some(program => normalizeProgramName(program) === normalizeProgramName(secondDepartment));
};

const buildDepartmentSpecificGuide = (department) => {
  const dept = normalizeGuideText(department);
  if (!dept) return null;
  const rule = DEPARTMENT_CAREER_RULES.find(item => item.match.some(keyword => dept.includes(normalizeGuideText(keyword))));
  if (!rule) return null;
  return {
    id: `specific-${rule.id}`,
    title: `${department}: ${rule.title}`,
    keywords: department,
    summary: rule.summary,
    steps: rule.steps
  };
};
const getDepartmentGuides = () => getStoredArray('iesu_department_guides', DEFAULT_DEPARTMENT_GUIDES);
const matchDepartmentGuide = (department, guides = getDepartmentGuides()) => {
  const dept = String(department || '').toLocaleLowerCase('tr-TR');
  const specific = buildDepartmentSpecificGuide(department);
  if (specific) return specific;
  return guides.find(guide => String(guide.keywords || '').toLocaleLowerCase('tr-TR').split(',').some(k => k.trim() && dept.includes(k.trim()))) || guides[0] || DEFAULT_DEPARTMENT_GUIDES[0];
};

const compressImage = (f) => { 
  return new Promise((res, rej) => { 
    if (!f.type.startsWith('image/')) { 
      const r = new FileReader(); r.onload = () => res(r.result); r.onerror = e => rej(e); r.readAsDataURL(f); return; 
    } 
    const r = new FileReader(); r.readAsDataURL(f); 
    r.onload = (ev) => { 
      const img = new Image(); img.src = ev.target.result; 
      img.onload = () => { 
        const canvas = document.createElement('canvas'); 
        const MW = 1280; const MH = 1280; 
        let w = img.width, h = img.height; 
        if (w > h) { if (w > MW) { h *= MW / w; w = MW; } } else { if (h > MH) { w *= MH / h; h = MH; } } 
        canvas.width = w; canvas.height = h; 
        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h); 
        res(canvas.toDataURL('image/jpeg', 0.8)); 
      }; 
      img.onerror = e => rej(e); 
    }; 
    r.onerror = e => rej(e); 
  }); 
};

const Countdown = ({ targetDate }) => {
  const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

  useEffect(() => {
    const calculateTimeLeft = () => {
      const difference = +new Date(targetDate) - +new Date();
      let timeLeft = { days: 0, hours: 0, minutes: 0, seconds: 0 };
      if (difference > 0) {
        timeLeft = {
          days: Math.floor(difference / (1000 * 60 * 60 * 24)),
          hours: Math.floor((difference / (1000 * 60 * 60)) % 24),
          minutes: Math.floor((difference / 1000 / 60) % 60),
          seconds: Math.floor((difference / 1000) % 60),
        };
      }
      return timeLeft;
    };
    setTimeLeft(calculateTimeLeft());
    const timer = setInterval(() => { setTimeLeft(calculateTimeLeft()); }, 1000);
    return () => clearInterval(timer);
  }, [targetDate]);

  return (
    <div className="flex gap-3 md:gap-4 justify-center items-center mt-6 mb-8 no-select">
      {Object.entries(timeLeft).map(([interval, value]) => (
        <div key={interval} className="flex flex-col items-center bg-white/60 dark:bg-dark-card/60 backdrop-blur-md rounded-2xl p-3 md:p-4 min-w-[70px] md:min-w-[90px] border border-white/30 shadow-lg">
          <span className="text-2xl md:text-4xl font-black text-brand-600 dark:text-brand-400 font-mono tracking-tighter">{value.toString().padStart(2, '0')}</span>
          <span className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">
            {interval === 'days' ? 'GÜN' : interval === 'hours' ? 'SAAT' : interval === 'minutes' ? 'DAKİKA' : 'SANİYE'}
          </span>
        </div>
      ))}
    </div>
  );
};

const ToastContext = createContext();
const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((message, type = 'info') => {
    const id = Date.now().toString() + Math.random().toString(36).substring(7);
    setToasts((p) => [...p, { id, message, type }]);
    setTimeout(() => setToasts((p) => p.filter((t) => t.id !== id)), 5000);
  }, []);
  return (
    <ToastContext.Provider value={{ addToast }}>
      {children}
      <div className="fixed top-24 right-6 z-[9999] flex flex-col gap-3 pointer-events-none w-full max-w-sm">
        {toasts.map((toast) => (
          <div key={toast.id} className={`p-4 rounded-xl shadow-xl flex items-start gap-3 pointer-events-auto transition-all animate-slide-up border
            ${toast.type === 'error' ? 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-800 dark:text-red-200' : 
              toast.type === 'success' ? 'bg-teal-50 dark:bg-teal-900/30 border-teal-200 dark:border-teal-800 text-teal-800 dark:text-teal-200' : 
              toast.type === 'warning' ? 'bg-amber-50 dark:bg-amber-900/30 border-amber-200 dark:border-amber-800 text-amber-800 dark:text-amber-200' :
              'bg-white dark:bg-dark-card border-slate-200 dark:border-dark-border text-slate-800 dark:text-slate-200'}`}>
            <i className={`fa-solid mt-1 text-lg ${toast.type === 'error' ? 'fa-circle-xmark text-red-500' : toast.type === 'success' ? 'fa-circle-check text-brand-500' : 'fa-circle-info text-accent-500'}`}></i>
            <p className="text-sm font-semibold leading-relaxed flex-1">{toast.message}</p>
            <button onClick={() => setToasts(p => p.filter(t => t.id !== toast.id))} className="opacity-50 hover:opacity-100 transition-opacity"><i className="fa-solid fa-xmark"></i></button>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
};

  const [query, setQuery] = useState(value || '');

  useEffect(() => setQuery(value || ''), [value]);

  const emitChange = (nextValue) => onChange?.({ target: { name, value: nextValue } });

    setOpen(false);

    <div className="relative">

        label={label}
        name={name}
        value={query}
        onChange={e => { setQuery(e.target.value); emitChange(e.target.value); setOpen(true); }}

        onBlur={() => setTimeout(() => setOpen(false), 140)}

const FileDropzone = ({ label, name, accept, icon, colorTheme, fileData, onFileChange, required, hasError }) => {
  const [isDragActive, setIsDragActive] = useState(false);
  const [isProcessing, setIsProcessing] = useState(false);
  const inputRef = useRef(null);
  const { addToast } = useToast();

  const handleDrag = (e) => { e.preventDefault(); e.stopPropagation(); if (e.type === "dragenter" || e.type === "dragover") setIsDragActive(true); else if (e.type === "dragleave" || e.type === "drop") setIsDragActive(false); };
  
  const processFile = async (file) => {
    if (!file) return;
    if (file.size > MAX_FILE_SIZE) { addToast(`Dosya boyutu çok büyük (${formatBytes(file.size)}). Maksimum sınır 15 MB.`, 'error'); if (inputRef.current) inputRef.current.value = ''; return; }
    setIsProcessing(true); 
    await new Promise(res => setTimeout(res, 100));
    try { 
      const base64Data = await compressImage(file); 
      onFileChange({ target: { name, fileObj: file, base64: base64Data } }); 
    } catch (error) { 
      addToast('Dosya işlenirken hata oluştu. Lütfen geçerli bir format deneyin.', 'error'); 
    } finally { 
      setIsProcessing(false); 
    }
  };

  const handleDrop = (e) => { handleDrag(e); if (e.dataTransfer.files && e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); };
  const handleChange = (e) => { e.preventDefault(); if (e.target.files && e.target.files[0]) processFile(e.target.files[0]); };
  const removeFile = (e) => { e.stopPropagation(); onFileChange({ target: { name, fileObj: null, base64: '' } }); if (inputRef.current) inputRef.current.value = ''; addToast('Dosya başarıyla kaldırıldı.', 'info'); };

  const themeColors = {
    brand: 'border-brand-200 bg-brand-50/50 hover:bg-brand-100 text-brand-500 dark:border-brand-800 dark:bg-brand-900/20 dark:hover:bg-brand-900/40',
    accent: 'border-accent-200 bg-accent-50/50 hover:bg-accent-100 text-accent-500 dark:border-accent-800 dark:bg-accent-900/20 dark:hover:bg-accent-900/40',
    rose: 'border-rose-200 bg-rose-50/50 hover:bg-rose-100 text-rose-500 dark:border-rose-800 dark:bg-rose-900/20 dark:hover:bg-rose-900/40',
  };
  const iconColors = {
    brand: 'text-brand-500',
    accent: 'text-accent-500',
    rose: 'text-rose-500',
  };
  const currentTheme = themeColors[colorTheme] || themeColors.brand;
  const currentIconColor = iconColors[colorTheme] || iconColors.brand;

  return (
    <div className="space-y-2 w-full no-select">
      <label className="text-xs font-semibold text-slate-600 dark:text-slate-400 block uppercase tracking-wider">{label} {required && <span className="text-red-500">*</span>}</label>
      <div className={`relative border-2 border-dashed rounded-2xl p-6 transition-all duration-300 cursor-pointer flex flex-col items-center justify-center gap-3 text-center
          ${isDragActive ? 'dropzone-active scale-[1.02]' : currentTheme}
          ${fileData ? 'border-solid border-emerald-400 bg-emerald-50 hover:bg-emerald-100 dark:bg-emerald-900/30 dark:hover:bg-emerald-900/50 dark:border-emerald-700 shadow-inner' : ''}
          ${hasError ? 'input-error' : ''}`}
        onDragEnter={handleDrag} onDragLeave={handleDrag} onDragOver={handleDrag} onDrop={handleDrop} onClick={() => !isProcessing && inputRef.current?.click()}>
        <input ref={inputRef} type="file" name={name} accept={accept} onChange={handleChange} className="hidden" />
        {isProcessing ? (
          <div className="flex flex-col items-center py-4"><i className={`fa-solid fa-circle-notch fa-spin text-3xl mb-3 ${currentIconColor}`}/><p className="text-sm font-bold text-slate-900 dark:text-white">Dosya İşleniyor...</p></div>
        ) : fileData ? (
          <div className="flex flex-col items-center animate-slide-in w-full">
            <div className="w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center mb-3 shadow-lg"><i className="fa-solid fa-file-circle-check text-white text-2xl"/></div>
            <p className="text-sm font-bold text-emerald-900 dark:text-emerald-300 truncate w-full px-4">{fileData.name}</p>
            <p className="text-xs font-bold text-emerald-600 dark:text-emerald-400 mt-1">Hazır ({formatBytes(fileData.size)})</p>
            <Button variant="danger" className="mt-4 text-xs py-1.5" onClick={removeFile} icon="fa-trash-can">Değiştir / Kaldır</Button>
          </div>
        ) : (
          <>
            <div className={`w-14 h-14 bg-white dark:bg-dark-card rounded-xl flex items-center justify-center shadow-sm mb-2 transform group-hover:scale-110 transition-transform`}><i className={`fa-solid ${icon} text-2xl ${currentIconColor}`}/></div>
            <div><p className="text-sm font-bold text-slate-800 dark:text-slate-200">Seçmek için tıklayın</p><p className="text-xs text-slate-500 dark:text-slate-400 mt-1 font-medium">veya dosyayı sürükleyin</p></div>
            <div className="flex gap-2 mt-1"><Badge color="slate">Max 15 MB</Badge><Badge color="slate">{accept.includes('image') ? 'JPG, PNG, PDF' : 'PPTX, PDF'}</Badge></div>
          </>
        )}
      </div>
      {hasError && <p className="text-xs font-bold text-red-500 mt-1 animate-slide-in"><i className="fa-solid fa-circle-exclamation mr-1"/> Bu dosyanın yüklenmesi zorunludur.</p>}
    </div>
  );
};

const StudentFeedbackPanel = ({ user }) => {
  const { addToast } = useToast();
  const configs = getSurveyConfigs();
  const survey = configs.studentEvaluation || DEFAULT_SURVEY_CONFIGS.studentEvaluation;
  const feedback = configs.requestComplaint || DEFAULT_SURVEY_CONFIGS.requestComplaint;
  const [scores, setScores] = useState(() => Object.fromEntries((survey.questions || []).map((_, i) => [i, 0])));
  const [form, setForm] = useState({ category: feedback.categories?.[0] || 'Öneri', subject: '', message: '' });

  const submitSurvey = async () => {
    const questions = survey.questions || [];
    if (questions.some((_, i) => !scores[i])) {
      addToast('Lütfen değerlendirme sorularının tamamına 1-5 arası puan verin.', 'warning');
      return;
    }
    const payload = {
      action: 'submitSurvey',
      id: `survey-${Date.now()}`,
      tarih: new Date().toLocaleString('tr-TR'),
      studentName: user?.name || '',
      studentEmail: user?.email || '',
      role: user?.roleTitle || user?.role || '',
      department: getUserDepartments(user).join(' | '),
      secondDepartment: user?.secondDepartment || '',
      classYear: user?.classYear || '',
      educationType: user?.educationType || '',
      graduationYear: user?.graduationYear || '',
      surveyTitle: survey.title,
      questions,
      scores,
      answerDetails: questions.map((question, i) => ({ question, score: scores[i] })),
      answerDetailsJson: JSON.stringify(questions.map((question, i) => ({ question, score: scores[i] }))),
      answers: questions.map((question, i) => `${question}: ${scores[i]}`).join(' | '),
      average: (Object.values(scores).reduce((a, b) => a + Number(b || 0), 0) / questions.length).toFixed(1),
      isTest: false,
      archiveStatus: 'official'
    };
    const saved = getStoredArray('iesu_student_surveys', []);
    setStoredJson('iesu_student_surveys', [payload, ...saved].slice(0, 200));
    try { await postToScriptApis(payload, 1); } catch(e) {}
    addToast('Değerlendirmeniz kaydedildi. Teşekkür ederiz.', 'success');
  };

  const submitFeedback = async () => {
    if (!form.subject.trim() || !form.message.trim()) {
      addToast('Lütfen konu ve mesaj alanlarını doldurun.', 'warning');
      return;
    }
    const payload = {
      action: 'submitFeedback',
      id: `feedback-${Date.now()}`,
      tarih: new Date().toLocaleString('tr-TR'),
      studentName: user?.name || '',
      studentEmail: user?.email || '',
      role: user?.roleTitle || user?.role || '',
      department: getUserDepartments(user).join(' | '),
      secondDepartment: user?.secondDepartment || '',
      classYear: user?.classYear || '',
      educationType: user?.educationType || '',
      graduationYear: user?.graduationYear || '',
      category: form.category,
      subject: form.subject.trim(),
      message: form.message.trim(),
      status: 'new',
      isTest: false,
      archiveStatus: 'official'
    };
    const saved = getStoredArray('iesu_feedback_forms', []);
    setStoredJson('iesu_feedback_forms', [payload, ...saved].slice(0, 200));
    try { await postToScriptApis(payload, 1); } catch(e) {}
    setForm(p => ({ ...p, subject: '', message: '' }));
    addToast('İstek/şikayet/öneri formunuz kaydedildi.', 'success');
  };

  return (
    <Card>
      <div className="flex flex-col lg:flex-row lg:items-start justify-between gap-5">
        <div className="flex-1">
          <Badge color="brand" className="mb-3">5'li Değerlendirme</Badge>
          <h3 className="text-lg font-black text-slate-900 dark:text-white">{survey.title}</h3>
          <p className="text-sm font-semibold text-slate-500 mt-1 leading-relaxed">{survey.description}</p>
          <div className="space-y-3 mt-5">
            {(survey.questions || []).map((question, i) => (
              <div key={i} className="rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 p-3 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <p className="text-sm font-bold text-slate-700 dark:text-slate-200 leading-relaxed">{question}</p>
                <LikertSelector value={scores[i]} onChange={(score) => setScores(p => ({ ...p, [i]: score }))} />
              </div>
            ))}
          </div>
          <Button onClick={submitSurvey} icon="fa-paper-plane" className="mt-4">Değerlendirmeyi Gönder</Button>
        </div>
        <div className="w-full lg:w-[360px] rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-4">
          <h4 className="font-black text-slate-900 dark:text-white mb-1">{feedback.title}</h4>
          <p className="text-xs font-semibold text-slate-500 mb-4">{feedback.description}</p>
          <div className="space-y-3">
            <select value={form.category} onChange={e => setForm(p => ({ ...p, category: e.target.value }))} className="w-full bg-slate-50 dark:bg-dark-bg border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm font-bold outline-none dark:text-white">
              {(feedback.categories || DEFAULT_SURVEY_CONFIGS.requestComplaint.categories).map(cat => <option key={cat}>{cat}</option>)}
            </select>
            <Input placeholder="Konu" value={form.subject} onChange={e => setForm(p => ({ ...p, subject: e.target.value }))} />
            <Input as="textarea" rows="4" placeholder="Mesajınızı yazın..." value={form.message} onChange={e => setForm(p => ({ ...p, message: e.target.value }))} />
            <Button full variant="outline" onClick={submitFeedback} icon="fa-inbox">Formu Kaydet</Button>
          </div>
        </div>
      </div>
    </Card>
  );
};

const AdminPoolPanel = ({ type, records, onDeleteRecord, onImpersonate }) => {
  const { addToast } = useToast();
  const [filters, setFilters] = useState({ search: '', department: '', faculty: '', classYear: '', educationType: '', graduationYear: '', employmentStatus: '', sector: '', cvStatus: '', profileStatus: '', academic: '', status: 'all' });
  const [selectedKey, setSelectedKey] = useState(records[0]?.profileKey || '');
  const [noteText, setNoteText] = useState('');
  const [tagText, setTagText] = useState('');
  const [bulkTag, setBulkTag] = useState('');
  const [selectedRows, setSelectedRows] = useState([]);
  const visible = filterPoolRecords(records, filters);
  const selected = visible.find(item => item.profileKey === selectedKey) || visible[0] || records[0];
  const departments = getUniqueValues(records.flatMap(item => item.departments || []), item => item);
  const faculties = getUniqueValues(records, item => item.faculty);
  const classYears = getUniqueValues(records, item => item.classYear);
  const educationTypes = getUniqueValues(records, item => item.educationType);
  const graduationYears = getUniqueValues(records, item => item.graduationYear);
  const employmentStatuses = getUniqueValues(records, item => item.employmentStatus);
  const sectors = getUniqueValues(records, item => item.sector);
  const stats = getProfileCompletenessStats(records);
  const contactReadyCount = records.filter(item => item.email || item.phone).length;
  const roleLabel = type === 'student' ? 'Öğrenci' : 'Mezun';

  useEffect(() => {
    if (!selectedKey && visible[0]) setSelectedKey(visible[0].profileKey);
  }, [visible.length]);

  const saveNote = () => {
    if (!selected) return;
    saveProfileAdminData(selected.profileKey, { note: noteText || selected.adminNote || '', lastContactAt: selected.lastContactAt });
    setNoteText('');
    addToast(`${roleLabel} notu kaydedildi.`, 'success');
  };
  const addTag = (target = selected, tag = tagText) => {
    if (!target || !tag.trim()) return;
    const current = getAdminNotes()[target.profileKey]?.tags || target.tags || [];
    saveProfileAdminData(target.profileKey, { tags: [...new Set([...current, tag.trim()])] });
    setTagText('');
    addToast('Etiket eklendi.', 'success');
  };
  const addBulkTag = () => {
    const targets = records.filter(item => selectedRows.includes(item.profileKey));
    if (!bulkTag.trim() || targets.length === 0) { addToast('Toplu etiket için kayıt ve etiket seçin.', 'warning'); return; }
    targets.forEach(item => addTag(item, bulkTag));
    setBulkTag('');
    setSelectedRows([]);
  };
  const logContact = (method, target = selected) => {
    if (!target) return;
    const log = { id: `comm-${Date.now()}`, date: new Date().toLocaleString('tr-TR'), targetType: roleLabel, name: target.name, email: target.email, phone: target.phone, method, subject: 'Havuz üzerinden iletişim', status: 'Hazırlandı' };

    saveProfileAdminData(target.profileKey, { lastContactAt: log.date });

    addToast(`${roleLabel} havuzu Excel uyumlu indirildi.`, 'success');
  };

  return (
    <div className="space-y-6 animate-fade-in">
      <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
        <AdminMiniStat icon={type === 'student' ? 'fa-user-graduate' : 'fa-user-tie'} label={`${roleLabel} Sayısı`} value={records.length} />
        <AdminMiniStat icon="fa-file-lines" label="CV Var" value={stats.withCv} color="emerald" />
        <AdminMiniStat icon="fa-triangle-exclamation" label="CV Eksik" value={stats.missingCv} color="rose" />
        <AdminMiniStat icon="fa-phone-volume" label="Ulaşılabilir" value={contactReadyCount} color="amber" />
      </div>
      <Card>
        <div className="flex flex-col lg:flex-row lg:items-end justify-between gap-4">
          <div>

            <p className="text-sm font-semibold text-slate-500 mt-1">Arama, filtre, etiket, admin notu ve iletişim geçmişi tek alanda tutulur.</p>
          </div>
          <div className="flex flex-wrap gap-2">
            <Button variant="outline" onClick={exportPool} icon="fa-file-excel">Havuzu İndir</Button>
            <Button variant="outline" onClick={addBulkTag} icon="fa-tags">Toplu Etiket</Button>
          </div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-6 gap-3 mt-5">
          <Input placeholder="Ad, e-posta, bölüm ara..." value={filters.search} onChange={e => setFilters(p => ({ ...p, search: e.target.value }))} icon="fa-search" />
          <select value={filters.department} onChange={e => setFilters(p => ({ ...p, department: e.target.value }))} className="bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-3 py-2.5 text-sm font-bold dark:text-white"><option value="">Bölüm</option>{departments.map(dep => <option key={dep}>{dep}</option>)}</select>

};

    if (filters.search && !haystack.includes(filters.search.toLocaleLowerCase('tr-TR'))) return false;

const AdminCommunicationCenter = ({ students, alumni }) => {
  const { addToast } = useToast();
  const [audience, setAudience] = useState('students');
  const [department, setDepartment] = useState('');
  const [subject, setSubject] = useState('');
  const [message, setMessage] = useState('');
  const pool = audience === 'alumni' ? alumni : audience === 'all' ? [...students, ...alumni] : students;
  const recipients = department ? pool.filter(item => (item.departments || []).includes(department)) : pool;
  const departments = getUniqueValues([...students, ...alumni].flatMap(item => item.departments || []), item => item);
  const logs = getCommunicationLogs();
  const saveDraft = () => {
    if (!subject.trim() || !message.trim()) { addToast('Duyuru konusu ve mesajını yazın.', 'warning'); return; }
    const record = { id: `comm-${Date.now()}`, date: new Date().toLocaleString('tr-TR'), targetType: audience, department, subject, message, count: recipients.length, status: 'Gönderime hazır liste' };
    saveCommunicationLogs([record, ...logs]);
    addToast('İletişim kaydı oluşturuldu. E-posta entegrasyonu için hazır liste üretildi.', 'success');
  };
  const exportRecipients = () => {
    downloadCsv('Iletisim_Gonderim_Listesi.csv', ['Ad Soyad','Rol','E-posta','Telefon','Bölüm'], recipients.map(item => [item.name, item.role, item.email, item.phone, (item.departments || []).join(' | ')]));
    addToast('Gönderime hazır liste indirildi.', 'success');
  };
  return (
    <div className="space-y-6 animate-fade-in">
      <Card className="bg-gradient-to-br from-brand-700 to-slate-900 border-0 text-white">
        <Badge color="brand" className="mb-4 bg-white/10 text-white border-white/20">Öğrenci ve Mezun İletişim Merkezi</Badge>
        <h3 className="text-2xl font-black">Duyuru, hatırlatma ve takip listeleri</h3>
        <p className="text-sm font-semibold text-brand-50/90 mt-2">Gerçek e-posta entegrasyonu eklenene kadar sistem gönderime hazır alıcı listesi ve iletişim kaydı üretir.</p>

      <div className="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-6">
        <Card>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
            <select value={audience} onChange={e => setAudience(e.target.value)} className="bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-3 py-2.5 text-sm font-bold dark:text-white"><option value="students">Tüm öğrenciler</option><option value="alumni">Tüm mezunlar</option><option value="all">Öğrenci + Mezun</option></select>
            <select value={department} onChange={e => setDepartment(e.target.value)} className="bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-3 py-2.5 text-sm font-bold dark:text-white"><option value="">Tüm bölümler</option>{departments.map(dep => <option key={dep}>{dep}</option>)}</select>
            <Badge color="brand" className="justify-center py-3">{recipients.length} alıcı</Badge>
          </div>
          <Input label="Duyuru Konusu" value={subject} onChange={e => setSubject(e.target.value)} icon="fa-heading" />
          <div className="mt-4"><Input as="textarea" rows="5" label="Mesaj Şablonu" value={message} onChange={e => setMessage(e.target.value)} placeholder="Örn: Kariyer günü öncesi firma/masa bilgileri..." /></div>
          <div className="flex flex-wrap gap-2 mt-4">
            <Button onClick={saveDraft} icon="fa-floppy-disk">İletişim Kaydı Oluştur</Button>
            <Button variant="outline" onClick={exportRecipients} icon="fa-file-excel">Alıcı Listesini İndir</Button>
          </div>
        </Card>
        <Card>
          <h3 className="font-black text-slate-900 dark:text-white mb-4">Son İletişim Kayıtları</h3>
          <div className="space-y-3 max-h-[420px] overflow-y-auto custom-scrollbar">
            {logs.length === 0 ? <p className="text-sm font-semibold text-slate-500">Henüz iletişim kaydı yok.</p> : logs.slice(0, 8).map(log => (
              <div key={log.id} className="rounded-xl border border-slate-200 dark:border-slate-700 p-3">
                <p className="font-black text-sm text-slate-900 dark:text-white">{log.subject || log.method || 'İletişim'}</p>
                <p className="text-xs font-semibold text-slate-500">{log.date} · {log.count || 1} kayıt</p>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
};

const AdminTaskCenter = () => {

const AdminProgramManagerPanel = () => {
  const { addToast } = useToast();
  const [programs, setPrograms] = useState(() => getManagedPrograms());
  const [newProgram, setNewProgram] = useState('');
  const [search, setSearch] = useState('');
  const visiblePrograms = programs.filter(program => program.toLocaleLowerCase('tr-TR').includes(search.toLocaleLowerCase('tr-TR'))).slice(0, 80);
  const savePrograms = (items = programs) => {
    const normalized = normalizeProgramList(items);
    setPrograms(normalized);
    saveManagedPrograms(normalized);
    addToast('Bölüm / program listesi kaydedildi.', 'success');
  };
  const addProgram = () => {
    const value = newProgram.trim();
    if (!value) { addToast('Eklemek için bölüm adı yazın.', 'warning'); return; }
    if (programs.some(program => program.toLocaleLowerCase('tr-TR') === value.toLocaleLowerCase('tr-TR'))) {
      addToast('Bu bölüm listede zaten var.', 'warning');
      return;
    }
    const next = normalizeProgramList([...programs, value]);
    setPrograms(next);
    setNewProgram('');
    saveManagedPrograms(next);
    addToast('Yeni bölüm listeye eklendi.', 'success');
  };
  const removeProgram = (program) => {
    const next = programs.filter(item => item !== program);
    setPrograms(next);
    saveManagedPrograms(next);
    addToast('Bölüm listeden kaldırıldı.', 'info');
  };
  const resetDefaults = () => {
    const defaults = normalizeProgramList(IESU_PROGRAM_SUGGESTIONS);
    setPrograms(defaults);
    saveManagedPrograms(defaults);
    addToast('Bölüm listesi varsayılan İESU listesine döndü.', 'success');
  };
  return (
    <Card>
      <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-6">
        <div>
          <h3 className="font-black text-lg text-slate-900 dark:text-white"><i className="fa-solid fa-graduation-cap text-brand-500 mr-2"/> Bölüm / Program Listesi Yönetimi</h3>
          <p className="text-sm font-semibold text-slate-500 mt-1">Kayıt ekranındaki aramalı bölüm listesi buradan güncellenir. Öğrenciler listede bulamazsa yine elle yazabilir.</p>
        </div>
        <div className="flex flex-wrap gap-2">
          <Badge color="brand">{programs.length} bölüm</Badge>
          <Button variant="outline" onClick={resetDefaults} icon="fa-rotate-left">Varsayılana Dön</Button>
          <Button onClick={() => savePrograms()} icon="fa-floppy-disk">Listeyi Kaydet</Button>
        </div>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-[1fr_160px] gap-3">
        <Input label="Yeni Bölüm / Program" value={newProgram} onChange={e => setNewProgram(e.target.value)} placeholder="Örn: Yapay Zeka ve Veri Mühendisliği" />
        <Button onClick={addProgram} icon="fa-plus" className="md:mt-6">Ekle</Button>
      </div>
      <div className="mt-5">
        <Input label="Listede Ara" value={search} onChange={e => setSearch(e.target.value)} icon="fa-search" placeholder="Bölüm adı yazın..." />
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-2 mt-4 max-h-96 overflow-y-auto custom-scrollbar pr-1">
        {visiblePrograms.length === 0 ? (
          <p className="text-sm font-semibold text-slate-500">Aramanıza uygun bölüm bulunamadı.</p>
        ) : visiblePrograms.map(program => (
          <div key={program} className="flex items-center justify-between gap-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 px-3 py-2">
            <span className="text-xs font-bold text-slate-700 dark:text-slate-200 leading-relaxed">{program}</span>
            <button onClick={() => removeProgram(program)} className="w-8 h-8 rounded-lg text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20 shrink-0" title="Bölümü sil">
              <i className="fa-solid fa-xmark"></i>
            </button>
          </div>
        ))}
      </div>
    </Card>
  );
};

const AdminLanguagePanel = () => {
  const { addToast } = useToast();
  const [rows, setRows] = useState(() => getStoredArray('iesu_custom_ui_translations', []));
  const [form, setForm] = useState({ tr: '', en: '' });
  const saveRows = (items = rows, message = 'Dil sözlüğü kaydedildi.') => {
    const cleaned = items
      .map(item => ({ ...item, tr: String(item.tr || '').trim(), en: String(item.en || '').trim() }))
      .filter(item => item.tr && item.en);
    setRows(cleaned);
    setStoredJson('iesu_custom_ui_translations', cleaned);
    try { window.dispatchEvent(new Event('iesu-translations-updated')); } catch(e) {}
    addToast(message, 'success');
  };
  const addRow = () => {
    if (!form.tr.trim() || !form.en.trim()) {
      addToast('Türkçe ve İngilizce karşılığı birlikte yazın.', 'warning');
      return;
    }
    saveRows([{ id: `lang-${Date.now()}`, tr: form.tr.trim(), en: form.en.trim() }, ...rows], 'Yeni çeviri satırı eklendi.');
    setForm({ tr: '', en: '' });
  };
  const updateRow = (id, field, value) => setRows(prev => prev.map(row => row.id === id ? { ...row, [field]: value } : row));
  const deleteRow = (id) => saveRows(rows.filter(row => row.id !== id), 'Çeviri satırı silindi.');
  const exportRows = () => {
    downloadCsv('Dil_Ceviri_Sozlugu.csv', ['Türkçe Metin','İngilizce Metin'], rows.map(row => [row.tr, row.en]));
    addToast('Dil sözlüğü Excel uyumlu indirildi.', 'success');
  };
  return (
    <div className="space-y-6 animate-fade-in">
      <Card className="bg-gradient-to-br from-brand-700 to-slate-950 border-0 text-white">
        <Badge color="brand" className="mb-4 bg-white/10 text-white border-white/20">Dil & Çeviri</Badge>
        <h3 className="text-2xl font-black">TR / EN basmalı dil sistemi</h3>
        <p className="text-sm font-semibold text-brand-50/90 mt-2">Üstteki dil düğmesi basıldığında site İngilizceye geçer. Buraya eklenen özel metinler İngilizce modda otomatik karşılanır.</p>
      </Card>
      <Card>
        <div className="flex flex-col lg:flex-row lg:items-end justify-between gap-4 mb-5">
          <div>
            <h3 className="text-xl font-black text-slate-900 dark:text-white">Özel Çeviri Sözlüğü</h3>
            <p className="text-sm font-semibold text-slate-500 mt-1">Yönetici panelinde yazdığınız özel başlıkları kodsuz şekilde İngilizce karşılığıyla eşleştirin.</p>
          </div>
          <div className="flex flex-wrap gap-2">
            <Button variant="outline" onClick={exportRows} icon="fa-file-excel">Sözlüğü İndir</Button>
            <Button onClick={() => saveRows()} icon="fa-floppy-disk">Sözlüğü Kaydet</Button>
          </div>
        </div>
        <div className="grid grid-cols-1 lg:grid-cols-[1fr_1fr_auto] gap-3 items-end">
          <Input label="Türkçe Metin" value={form.tr} onChange={e => setForm(p => ({ ...p, tr: e.target.value }))} placeholder="Örn: Kariyer Danışmanlığı" />
          <Input label="İngilizce Karşılığı" value={form.en} onChange={e => setForm(p => ({ ...p, en: e.target.value }))} placeholder="Örn: Career Counseling" />
          <Button onClick={addRow} icon="fa-plus">Ekle</Button>
        </div>
      </Card>
      <Card>
        <div className="overflow-x-auto custom-scrollbar">
          <table className="w-full text-left text-sm">
            <thead className="text-[10px] uppercase tracking-widest text-slate-400 border-b border-slate-200 dark:border-slate-700">
              <tr><th className="p-3">Türkçe</th><th className="p-3">English</th><th className="p-3 text-right">İşlem</th></tr>
            </thead>
            <tbody>
              {rows.length === 0 ? (
                <tr><td colSpan="3" className="p-6 text-center font-bold text-slate-500">Henüz özel çeviri eklenmedi. Sistem varsayılan temel sözlüğü kullanır.</td></tr>
              ) : rows.map(row => (
                <tr key={row.id} className="border-b border-slate-100 dark:border-slate-800">

const ADMIN_LOGIN_USERNAME = 'Kariyer';
const getFrontendAdminPassword = () => ['Z', '.', 's', '.', '1513'].join('');
const isLocalAdminCredential = (username, password) => String(username || '').trim() === ADMIN_LOGIN_USERNAME && String(password || '').trim() === getFrontendAdminPassword();

const AdminLoginModal = ({ onClose, onLogin }) => {
  const [username, setUsername] = useState('Kariyer');
  const [pwd, setPwd] = useState('');
  const { addToast } = useToast();
  const RATE_LIMIT_KEY = 'iesu_admin_login_attempts';

  const getAttemptState = () => {
    try { return JSON.parse(localStorage.getItem(RATE_LIMIT_KEY) || '{"count":0,"lockedUntil":0}'); }
    catch(e) { return { count: 0, lockedUntil: 0 }; }
  };

  const registerFailedAttempt = () => {
    const now = Date.now();
    const state = getAttemptState();
    const count = (state.lockedUntil && state.lockedUntil > now) ? state.count : (state.count || 0) + 1;
    const lockedUntil = count >= 5 ? now + 5 * 60 * 1000 : 0;
    localStorage.setItem(RATE_LIMIT_KEY, JSON.stringify({ count, lockedUntil }));
    addToast(lockedUntil ? 'Çok fazla hatalı deneme yapıldı. 5 dakika sonra tekrar deneyin.' : 'Yönetici kullanıcı adı veya şifresi hatalı.', 'error');
  };

  const resetAttempts = () => { try { localStorage.removeItem(RATE_LIMIT_KEY); } catch(e) {} };

  const handleSubmit = (e) => {
    e.preventDefault();
    const state = getAttemptState();
    if (state.lockedUntil && state.lockedUntil > Date.now()) {
      addToast('Güvenlik kilidi aktif. Birkaç dakika sonra tekrar deneyin.', 'error');
      return;
    }
    if (isLocalAdminCredential(username, pwd)) {
      resetAttempts();
      onLogin();
      return;
    }
    registerFailedAttempt();
  };

  return (
    <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[9999] flex items-center justify-center p-4 animate-fade-in no-select">
      <Card className="w-full max-w-sm relative !p-8 animate-slide-up shadow-2xl border-slate-700">
        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
        <div className="text-center mb-8 mt-2">
           <div className="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 bg-brand-600 text-white shadow-lg">
              <i className="fa-solid fa-shield-halved text-3xl"></i>
           </div>
           <h3 className="text-2xl font-black text-slate-900 dark:text-white">Yönetici Girişi</h3>
           <p className="text-sm font-semibold text-slate-500 mt-2">Yetkili yönetici bilgileriyle giriş yapın.</p>
        </div>
        <form onSubmit={handleSubmit} className="space-y-4">
           <Input type="text" icon="fa-user-shield" placeholder="Yönetici Kullanıcı Adı" value={username} onChange={e => setUsername(e.target.value)} required />
           <Input type="password" icon="fa-key" placeholder="Yönetici Şifresi" value={pwd} onChange={e => setPwd(e.target.value)} required />
           <Button full type="submit">Giriş Yap <i className="fa-solid fa-check"></i></Button>
        </form>
      </Card>
    </div>
  );
};

const CAREER_READINESS_COMPETENCIES = [
  { id:'career', label:'Kariyer yönü', icon:'fa-compass' },
  { id:'communication', label:'İletişim', icon:'fa-comments' },
  { id:'professionalism', label:'Profesyonellik', icon:'fa-user-tie' },
  { id:'technology', label:'Dijital yetkinlik', icon:'fa-laptop-code' },
  { id:'network', label:'Network', icon:'fa-people-arrows' },
  { id:'confidence', label:'Hazırlık güveni', icon:'fa-shield-heart' }
];
const getCareerReadinessProfile = ({ user = {}, role = 'student', cvData = {}, prepScore = 0, fairPlanner = [], employmentForm = {}, submissions = [] }) => {
  const safeCv = normalizeCvData(cvData, user);
  cvData = safeCv;
  const cvPersonal = safeCv.personal || {};
  const checks = [];
  const hasContact = !!(user.email || cvPersonal.email || cvPersonal.phone || user.phone);
  const hasDepartment = !!(user.department || cvData.department || safeCv.education?.[0]?.degree);
  const cvCompletion = getCvCompletion(cvData || {});
  const plannedCompanies = Array.isArray(fairPlanner) ? fairPlanner.length : 0;
  const hasLinkedin = !!(cvPersonal.linkedin || cvPersonal.github || cvData.portfolio || user.linkedin);
  const hasExperience = !!((cvData.experience || []).length || (cvData.experiences || []).length || (cvData.projects || []).length || cvData.summary || cvPersonal.about);
  const hasSkills = !!((cvData.skills || []).length || cvData.skillsText);
  const hasCareerState = role === 'alumni' ? !!employmentForm.status : !!(user.classYear || user.educationType);
  checks.push({ id:'profile', label:'Profil bilgileri', done: hasContact && hasDepartment, help:'E-posta, telefon, bölüm ve sınıf bilgisi kariyer yönlendirmesini güçlendirir.' });
  checks.push({ id:'cv', label:'CV olgunluğu', done: cvCompletion >= 65, help:'CV kalite puanı yükseldikçe firma görüşmelerinde hazırlık seviyesi artar.' });
  checks.push({ id:'experience', label:'Deneyim / proje', done: hasExperience, help:'Staj, proje, gönüllülük veya kulüp deneyimi eklenebilir.' });
  checks.push({ id:'skills', label:'Yetkinlik alanı', done: hasSkills, help:'Teknik ve sosyal beceriler kısa ve ölçülebilir yazılmalı.' });
  checks.push({ id:'digital', label:'Dijital görünürlük', done: hasLinkedin, help:'LinkedIn, portfolyo veya GitHub bağlantısı eklenebilir.' });
  checks.push({ id:'fair', label:'Firma planı', done: role === 'alumni' ? submissions.length > 0 : plannedCompanies >= 3 || prepScore >= 60, help:'En az 3 firma seçip görüşme hedefi belirlemek önerilir.' });
  checks.push({ id:'state', label: role === 'alumni' ? 'Mezun kariyer durumu' : 'Sınıf ve eğitim bilgisi', done: hasCareerState, help: role === 'alumni' ? 'İstihdam durumunu güncel tutmak mezun ağı için önemlidir.' : 'Sınıf bilgisi etkinlik ve duyuru segmentasyonu için kullanılır.' });
  const done = checks.filter(item => item.done).length;
  const score = Math.round((done / checks.length) * 100);
  const level = score >= 80 ? 'Güçlü' : score >= 55 ? 'Gelişiyor' : 'Başlangıç';
  const color = score >= 80 ? 'emerald' : score >= 55 ? 'amber' : 'rose';
  const actions = checks.filter(item => !item.done).slice(0, 4);
  const competencies = CAREER_READINESS_COMPETENCIES.map(item => ({
    ...item,
    score: item.id === 'career' ? Math.min(100, Math.round((hasCareerState ? 35 : 0) + (plannedCompanies ? 30 : 0) + (prepScore * 0.35))) :
      item.id === 'communication' ? Math.min(100, Math.round((cvData.summary ? 35 : 0) + (hasExperience ? 25 : 0) + (prepScore * 0.40))) :
      item.id === 'professionalism' ? Math.min(100, Math.round((cvCompletion * 0.55) + (hasContact ? 20 : 0) + (hasLinkedin ? 25 : 0))) :
      item.id === 'technology' ? Math.min(100, Math.round((hasSkills ? 45 : 0) + (hasLinkedin ? 20 : 0) + (cvCompletion * 0.35))) :
      item.id === 'network' ? Math.min(100, Math.round((plannedCompanies * 18) + (role === 'alumni' && employmentForm.status ? 25 : 0) + (hasLinkedin ? 25 : 0))) :
      Math.min(100, Math.round((prepScore * 0.65) + (cvCompletion * 0.35)))
  }));
  return { score, level, color, checks, actions, competencies, cvCompletion };
};

const getDataQualityIssues = ({ submissions = [], students = [], alumni = [], surveys = [], feedbackForms = [], consulting = [] }) => {
  const issues = [];
  const add = (severity, area, label, message, owner = 'Yönetim') => issues.push({ id: `${severity}-${area}-${issues.length}`, severity, area, label, message, owner });
  const allUsers = [...students, ...alumni];
  allUsers.forEach(user => {
    const who = user.name || user.email || 'Kullanıcı';
    if (!user.email) add('high','Kullanıcı',who,'E-posta bilgisi eksik.');
    if (!user.department) add('medium','Kullanıcı',who,'Bölüm / program bilgisi eksik.');
    if (user.role === 'student' && !user.classYear) add('medium','Öğrenci',who,'Sınıf bilgisi eksik.');
    if (user.role === 'alumni' && !user.graduationYear) add('low','Mezun',who,'Mezuniyet yılı eksik.');
  });
  const seenEmails = {};
  allUsers.forEach(user => { const key = String(user.email || '').toLocaleLowerCase('tr-TR'); if (!key) return; seenEmails[key] = (seenEmails[key] || 0) + 1; });
  Object.keys(seenEmails).filter(key => seenEmails[key] > 1).forEach(key => add('high','Tekrarlı Kayıt',key,`${seenEmails[key]} kez görünen e-posta kaydı.`));
  submissions.forEach(item => {
    const name = item.firmaAdi || item.email || 'Firma';
    if (!item.email) add('high','Firma',name,'Firma e-posta bilgisi eksik.');
    if (!getCompanySector(item) || getCompanySector(item) === 'Belirtilmedi') add('medium','Firma',name,'Sektör bilgisi boş veya belirsiz.');
    if (!item.masaNo && isAcceptedCompany(item)) add('medium','Firma',name,'Onaylı firma için masa/stant bilgisi eksik.');
    const health = getDriveHealthProfile(item, 'Fuar ve Firma Kayitlari');
    if (health.score < 100) add(health.score < 40 ? 'high' : 'medium','Drive',name,`Drive kaydı eksik: ${health.missing.join(', ') || 'kontrol gerekli'}.`);
  });
  surveys.filter(item => item.isTest).forEach(item => add('low','Test Veri',item.studentName || item.studentEmail || item.id,'Test anket kaydı resmi rapora dahil edilmemeli.'));
  feedbackForms.filter(item => item.isTest).forEach(item => add('low','Test Veri',item.studentName || item.studentEmail || item.id,'Test geri bildirim kaydı resmi rapora dahil edilmemeli.'));
  consulting.filter(item => !item.status || item.status === 'new').slice(0, 20).forEach(item => add('medium','Danışmanlık',item.studentName || item.studentEmail || item.id,'Bekleyen danışmanlık talebi var.'));
  return issues;
};

const getCompanyParticipationRows = (company = {}, submissions = []) => {
  const email = normalizeCompanyEmail(company.email);
  const name = normalizeStatusText(company.firmaAdi || company.companyName || '');
  const rows = mergeCompanyAdminData([...submissions, company]).filter(item => {
    const itemEmail = normalizeCompanyEmail(item.email);
    const itemName = normalizeStatusText(item.firmaAdi || item.companyName || '');
    return (email && itemEmail === email) || (name && itemName === name);
  });
  const unique = new Map();
  rows.forEach(item => {
    const key = `${item.id || item.firmaId || item.companyId || item.email || item.firmaAdi}-${item.year || '-'}`;
    unique.set(key, item);
  });
  return [...unique.values()].sort((a, b) => String(b.year || '').localeCompare(String(a.year || ''), 'tr'));
};

  const normalizeUrl = (url) => {
    const raw = String(url || '').trim();
    if (!raw) return IESU_NEWS_SOURCE_URL;
    if (raw.startsWith('http')) return raw;
    return `https://www.esenyurt.edu.tr${raw.startsWith('/') ? raw : '/' + raw}`;
  };

  const normalizeFeedItem = (item, type = 'Haber') => ({
    type: item.type || type,
    title: item.title || item.name || item.text || 'İESU haberi',
    date: item.date || item.publishedAt || item.fetchedAt || '',
    url: normalizeUrl(item.url || item.sourceUrl || IESU_NEWS_SOURCE_URL),
    imageUrl: normalizeUrl(item.imageUrl || item.image || item.img || item.thumbnail || item.ogImage || ''),
    summary: item.summary || item.description || ''
  });

      const result = await postToScriptApis({ action: 'fetchIesuNews', sourceUrl: IESU_NEWS_SOURCE_URL, fallbackFeed: IESU_OFFICIAL_FEED_FALLBACK }, 1);

const FairRegistrationForm = ({ siteSpeakerSlots = {}, siteTimeSlots = {}, globalEventSettings, eventYears = ['2026'], submissions = [], setRoute, onLocalSubmit }) => {
  const { addToast } = useToast();
  const firstYear = eventYears && eventYears.length > 0 ? eventYears[0] : '2026';
  const activeEventYear = globalEventSettings?.activeEventYear || firstYear;

  const [isSubmitted, setIsSubmitted] = useState(false);
  const [submitNotice, setSubmitNotice] = useState('');
  const [errors, setErrors] = useState({});
  const [files, setFiles] = useState({ logo: null, foto: null, sunum: null });
  const companyAccess = getCompanyAccessSettings();
  const materialOptions = getCompanyMaterialOptions();
  const eventNeedOptions = getEventNeedOptions();
  const [formData, setFormData] = useState({
    firmaAdi: '',
    yetkiliKisi: '',
    telefon: '',
    email: '',
    sector: '',
    stantAcacak: 'Evet',
    konusmaci: 'Hayır',
    konusmaSaati: '',
    konusmaBasligi: '',
    konusmaciAd: '',
    konusmaciUnvan: '',
    teslimatGunu: '',
    teslimatSaati: '',
    materialCategories: [],
    materyaller: '',
    eventNeeds: [],
    ekTalepler: '',
    ekipman: '',
    cv: ''
  });

  const speakerSlotsForYear = Array.isArray(siteSpeakerSlots) ? siteSpeakerSlots : (siteSpeakerSlots[selectedYear] || []);
  const reservedSpeakerSlots = useMemo(() => new Set(
    (submissions || [])
      .filter(s => !isArchivedCompany(s) && (s.year || s.Yıl) === selectedYear && s.konusmaci === 'Evet' && s.konusmaSaati && s.konusmaSaati !== '-')
      .map(s => s.konusmaSaati)
  ), [submissions, selectedYear]);
  const availableSpeakerSlots = speakerSlotsForYear.filter(slot => !reservedSpeakerSlots.has(slot.time) || slot.time === formData.konusmaSaati);
  const logisticsEntriesForYear = Object.entries(siteTimeSlots || {}).filter(([date]) => getYearFromDateLabel(date, eventYears, selectedYear) === selectedYear);
  const selectedLogisticsTimes = formData.teslimatGunu ? (siteTimeSlots[formData.teslimatGunu] || []) : [];
  const pageTitle = globalEventSettings?.title2 || DEFAULT_HERO_SETTINGS.title2;
  const selectClass = "w-full bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border focus:border-brand-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white transition-all appearance-none cursor-pointer";

  useEffect(() => {
    setFormData(prev => ({ ...prev, konusmaSaati: '', teslimatGunu: '', teslimatSaati: '' }));
    setErrors({});
  }, [selectedYear]);

  useEffect(() => {
    setSelectedYear(activeEventYear);
  }, [activeEventYear]);

  const fileInfo = (key) => files[key]?.fileObj ? { name: files[key].fileObj.name, size: files[key].fileObj.size } : null;
  const clearError = (key) => setErrors(prev => {
    if (!prev[key]) return prev;
    const next = { ...prev };
    delete next[key];
    return next;
  });

  const handleChange = (e) => {
    const { name, value } = e.target;
    const nextValue = name === 'telefon' ? formatPhoneNumber(value) : value;
    setFormData(prev => ({
      ...prev,
      [name]: nextValue,
      ...(name === 'teslimatGunu' ? { teslimatSaati: '' } : {})
    }));
    clearError(name);
  };

  const setChoice = (name, value) => {
    setFormData(prev => ({
      ...prev,
      [name]: value,
      ...(name === 'stantAcacak' && value === 'Hayır' ? { teslimatGunu: '', teslimatSaati: '', materialCategories: [], eventNeeds: [], materyaller: '', ekTalepler: '' } : {}),
      ...(name === 'konusmaci' && value === 'Hayır' ? { konusmaSaati: '', konusmaBasligi: '', konusmaciAd: '', konusmaciUnvan: '', ekipman: '' } : {})
    }));
    clearError(name);
  };

  const toggleMaterialCategory = (category) => {
    setFormData(prev => {
      const current = prev.materialCategories || [];
      const next = current.includes(category) ? current.filter(item => item !== category) : [...current, category];
      return { ...prev, materialCategories: next };
    });
    clearError('materyaller');
  };

  const toggleEventNeed = (need) => {
    setFormData(prev => {
      const current = prev.eventNeeds || [];
      const next = current.includes(need) ? current.filter(item => item !== need) : [...current, need];
      return { ...prev, eventNeeds: next };
    });
  };

  const handleFileChange = (e) => {
    const { name, fileObj, base64 } = e.target;
    setFiles(prev => ({ ...prev, [name]: fileObj ? { fileObj, base64 } : null }));
    clearError(name);
  };

  const validate = () => {
    const nextErrors = {};
    const requiredFields = ['firmaAdi', 'yetkiliKisi', 'telefon', 'email'];
    requiredFields.forEach(field => {
      if (!formData[field]?.trim()) nextErrors[field] = 'Bu alan zorunludur.';
    });
    if (formData.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) nextErrors.email = 'Geçerli bir e-posta adresi giriniz.';
    if (formData.stantAcacak === 'Hayır' && formData.konusmaci === 'Hayır') nextErrors.participation = 'En az bir katılım türü seçiniz.';
    if (formData.stantAcacak === 'Evet') {
      if (!formData.teslimatGunu) nextErrors.teslimatGunu = 'Teslimat günü seçiniz.';
      if (!formData.teslimatSaati) nextErrors.teslimatSaati = 'Teslimat saati seçiniz.';
      if (!formData.materyaller.trim() && (formData.materialCategories || []).length === 0) nextErrors.materyaller = 'Materyal türü seçin veya açıklama yazın.';
    }
    if (formData.konusmaci === 'Evet') {
      ['konusmaSaati', 'konusmaBasligi', 'konusmaciAd', 'konusmaciUnvan'].forEach(field => {
        if (!formData[field]?.trim()) nextErrors[field] = 'Konuşmacı bilgisi zorunludur.';
      });
    }
    return nextErrors;
  };

  const buildSubmission = () => {
    const now = Date.now();
    const materialCategories = formData.materialCategories || [];
    const eventNeeds = formData.eventNeeds || [];
    const materialSummary = [
      materialCategories.length ? materialCategories.join(', ') : '',
      formData.materyaller.trim(),
      eventNeeds.length ? `Alan ihtiyacı: ${eventNeeds.join(', ')}` : '',
      formData.ekTalepler.trim() ? `Ek talep: ${formData.ekTalepler.trim()}` : ''
    ].filter(Boolean).join(' | ') || '-';
    const base = {
      id: `fair-${now}`,
      year: selectedYear,
      tarih: new Date(now).toLocaleString('tr-TR'),
      status: 'active',
      appStatus: 'Yeni',
      panelAccess: false,
      driveRootFolderId: DRIVE_ROOT_FOLDER_ID,
      driveStatus: 'Drive aktarımı bekliyor',
      firmaAdi: formData.firmaAdi.trim(),
      yetkiliKisi: formData.yetkiliKisi.trim(),
      telefon: formData.telefon.trim(),
      email: formData.email.trim(),
      sector: formData.sector.trim() || '-',
      stantAcacak: formData.stantAcacak,
      konusmaci: formData.konusmaci,
      konusmaSaati: formData.konusmaci === 'Evet' ? formData.konusmaSaati : '-',
      konusmaBasligi: formData.konusmaci === 'Evet' ? formData.konusmaBasligi.trim() : '-',
      konusmaciAd: formData.konusmaci === 'Evet' ? formData.konusmaciAd.trim() : '-',
      konusmaciUnvan: formData.konusmaci === 'Evet' ? formData.konusmaciUnvan.trim() : '-',
      teslimatGunu: formData.stantAcacak === 'Evet' ? formData.teslimatGunu : '-',
      teslimatSaati: formData.stantAcacak === 'Evet' ? formData.teslimatSaati : '-',
      materyaller: formData.stantAcacak === 'Evet' ? materialSummary : '-',
      materyalKategorileri: formData.stantAcacak === 'Evet' ? materialCategories.join(', ') : '-',
      etkinlikAlaniIhtiyaclari: formData.stantAcacak === 'Evet' ? eventNeeds.join(', ') : '-',
      ekTalepler: formData.stantAcacak === 'Evet' ? (formData.ekTalepler.trim() || '-') : '-',
      ekipman: formData.konusmaci === 'Evet' ? (formData.ekipman.trim() || '-') : '-',
      cv: formData.cv.trim() || '-',
      logoDosyaAdi: files.logo?.fileObj?.name || '',
      fotoDosyaAdi: files.foto?.fileObj?.name || '',
      sunumDosyaAdi: files.sunum?.fileObj?.name || '',
      logoDriveUrl: '',
      fotoDriveUrl: '',
      sunumDriveUrl: ''
    };
    return {
      ...base,
      action: 'submit',
      formType: 'fair-registration',
      logoData: files.logo?.base64 || '',
      logoMimeType: files.logo?.fileObj?.type || '',
      fotoData: files.foto?.base64 || '',
      fotoMimeType: files.foto?.fileObj?.type || '',
      sunumData: files.sunum?.base64 || '',
      sunumMimeType: files.sunum?.fileObj?.type || ''
    };
  };

  const resetForm = () => {
    setFormData({
      firmaAdi: '',
      yetkiliKisi: '',
      telefon: '',
      email: '',
      sector: '',
      stantAcacak: 'Evet',
      konusmaci: 'Hayır',
      konusmaSaati: '',
      konusmaBasligi: '',
      konusmaciAd: '',
      konusmaciUnvan: '',
      teslimatGunu: '',
      teslimatSaati: '',
      materialCategories: [],
      materyaller: '',
      eventNeeds: [],
      ekTalepler: '',
      ekipman: '',
      cv: ''
    });
    setFiles({ logo: null, foto: null, sunum: null });
    setErrors({});

  const handleSubmit = async (e) => {
    e.preventDefault();
    const nextErrors = validate();
    setErrors(nextErrors);
    if (Object.keys(nextErrors).length > 0) {
      addToast('Lütfen işaretlenen alanları kontrol edin.', 'warning');
      return;
    }

    setIsSubmitting(true);
    const payload = buildSubmission();
    const localSubmission = saveLocalFairSubmission(payload);
    onLocalSubmit?.(localSubmission);

    try {
      const apiResult = await postToScriptApis(payload, 1);
      const drivePatch = getApiDrivePatch(apiResult);
      saveLocalFairSubmission({ ...localSubmission, ...drivePatch, driveStatus: drivePatch.driveStatus || 'Drive kaydı tamamlandı', driveSyncedAt: drivePatch.driveSyncedAt || new Date().toLocaleString('tr-TR') });

      addToast('Firma başvurunuz başarıyla alındı ve yönetim paneline aktarıldı.', 'success');

                  <div className="mt-3">

            <Card className="bg-gradient-to-br from-slate-900 via-brand-900 to-accent-900 border-0 text-white overflow-hidden relative">

                <div className="flex justify-between gap-4"><span className="text-brand-100/80">Sahne</span><span className="text-right">{formData.konusmaSaati || '-'}</span></div>
                <div className="flex justify-between gap-4"><span className="text-brand-100/80">Teslimat</span><span className="text-right">{formData.teslimatSaati || '-'}</span></div>

              <Button full type="submit" disabled={isSubmitting} icon={isSubmitting ? "fa-circle-notch fa-spin" : "fa-paper-plane"} className="mt-6 bg-white text-brand-700 hover:bg-brand-50 shadow-xl shadow-black/10">
                {isSubmitting ? 'Gönderiliyor...' : 'Başvuruyu Gönder'}
