};

const CVBuilder = ({ user }) => {
  const { addToast } = useToast();
  const [activeTab, setActiveTab] = useState('personal');
  const [template, setTemplate] = useState('modern');
  const [isSaved, setIsSaved] = useState(false);
  const [isSavingCloud, setIsSavingCloud] = useState(false);
  const [photoInfo, setPhotoInfo] = useState(null);
  const cvStorageKey = getScopedStorageKey('iesu_cv_data', user);

  const makeBaseCvData = () => ({
    personal: { name: user?.name || '', email: user?.email || '', phone: user?.phone || '', linkedin: '', github: '', about: '', photoUrl: '' },
    experience: [],
    education: getUserDepartments(user).map((department, index) => ({ id: Date.now() + index, school: 'İstanbul Esenyurt Üniversitesi', degree: department, date: '' })),
    skills: [],
    certificates: [],
    projects: [],
    volunteering: [],
    leadership: []
  });

  const [cvData, setCvData] = useState(() => {
    const baseCv = makeBaseCvData();
    try {
      const savedCV = localStorage.getItem(cvStorageKey);
      if (savedCV) {
        const parsed = JSON.parse(savedCV);
        return normalizeCvData(parsed, user);
        if(parsed.personal && parsed.personal.title !== undefined) {
           delete parsed.personal.title;
        }
        return {
          ...baseCv,
          ...parsed,
          personal: { ...baseCv.personal, ...(parsed.personal || {}) },
          experience: parsed.experience || [],
          education: parsed.education || baseCv.education,
          skills: parsed.skills || [],
          certificates: parsed.certificates || [],
          projects: parsed.projects || [],
          volunteering: parsed.volunteering || [],
          leadership: parsed.leadership || []
        };
      }
      const legacyCV = localStorage.getItem('iesu_cv_data');
      if (legacyCV) {
        const parsed = JSON.parse(legacyCV);
        const legacyEmail = parsed?.personal?.email || '';
        if (legacyEmail && user?.email && legacyEmail === user.email) {
          return normalizeCvData(parsed, user);
          return {
            ...baseCv,
            ...parsed,
            personal: { ...baseCv.personal, ...(parsed.personal || {}) },
            experience: parsed.experience || [],
            education: parsed.education || baseCv.education,
            skills: parsed.skills || [],
            certificates: parsed.certificates || [],
            projects: parsed.projects || [],
            volunteering: parsed.volunteering || [],
            leadership: parsed.leadership || []
          };
        }
      }
    } catch (e) {}
    return baseCv;
  });

  useEffect(() => { setIsSaved(false); }, [cvData, template]);

  const handlePersonal = (e) => setCvData(p => ({...p, personal: {...p.personal, [e.target.name]: e.target.value}}));
  const addExp = () => setCvData(p => ({...p, experience: [...p.experience, { id: Date.now(), title: '', company: '', date: '', desc: '' }]}));
  const updateExp = (id, field, value) => setCvData(p => ({...p, experience: p.experience.map(e => e.id === id ? { ...e, [field]: value } : e)}));
  const removeExp = (id) => setCvData(p => ({...p, experience: p.experience.filter(e => e.id !== id)}));
  const addEdu = () => setCvData(p => ({...p, education: [...p.education, { id: Date.now(), school: '', degree: '', date: '' }]}));
  const updateEdu = (id, field, value) => setCvData(p => ({...p, education: p.education.map(e => e.id === id ? { ...e, [field]: value } : e)}));
  const removeEdu = (id) => setCvData(p => ({...p, education: p.education.filter(e => e.id !== id)}));
  const [newSkill, setNewSkill] = useState('');
  const addSkill = (e) => { e.preventDefault(); if(newSkill.trim() && !cvData.skills.includes(newSkill.trim())) { setCvData(p => ({...p, skills: [...p.skills, newSkill.trim()]})); setNewSkill(''); } };
  const removeSkill = (skill) => setCvData(p => ({...p, skills: p.skills.filter(s => s !== skill)}));
  const addCvItem = (key, item) => setCvData(p => ({ ...p, [key]: [...(p[key] || []), { id: Date.now() + Math.random(), ...item }] }));
  const updateCvItem = (key, id, field, value) => setCvData(p => ({ ...p, [key]: (p[key] || []).map(item => item.id === id ? { ...item, [field]: value } : item) }));
  const removeCvItem = (key, id) => setCvData(p => ({ ...p, [key]: (p[key] || []).filter(item => item.id !== id) }));

  const getHtml2PdfFactory = () => {
    try {
      return (typeof globalThis !== 'undefined' && typeof globalThis.html2pdf === 'function') ? globalThis.html2pdf : null;
    } catch(e) {
      return null;
    }
  };

  const getCvPdfOptions = (element) => ({
    margin: [0, 0, 0, 0],
    filename: `${(cvData.personal.name || 'IESU_CV').replace(/\s+/g, '_')}_CV.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      scrollX: 0,
      scrollY: 0,
      x: 0,
      y: 0,
      width: element.scrollWidth,
      windowWidth: element.scrollWidth,
      logging: false,
      onclone: (clonedDoc) => {
        const clonedCv = clonedDoc.getElementById('cv-print-area');
        if (clonedCv) {
          clonedCv.classList.add('cv-pdf-canvas');
          clonedCv.style.transform = 'none';
          clonedCv.style.left = '0';
          clonedCv.style.top = '0';
        }
      }
    },
    jsPDF: { unit: 'mm', format: [210, 297], orientation: 'portrait', compress: true },
    pagebreak: { mode: ['css', 'legacy'], avoid: ['.print-section'] }
  });

  const handleSaveToCloud = async () => {
    if (!cvData.personal.name || !cvData.personal.email) {
       addToast('Lütfen kaydetmeden önce adınızı ve e-posta adresinizi doldurun.', 'warning');
       return;
    }
    
    setIsSavingCloud(true);
    addToast('CV PDF olarak oluşturuluyor ve İESU Drive bulutuna yükleniyor...', 'info');
    
    try {
      localStorage.setItem(cvStorageKey, JSON.stringify(cvData));
      
      const element = document.getElementById('cv-print-area');
      const opt = getCvPdfOptions(element);
      
      const html2pdfFactory = getHtml2PdfFactory();
      if (!html2pdfFactory) throw new Error('HTML2PDF kütüphanesi yüklenemedi.');
      const pdfDataUri = await html2pdfFactory().from(element).set(opt).outputPdf('datauristring');
      const base64Data = pdfDataUri.split(',')[1];
      
      const payload = {
        action: 'uploadCV',
        fileName: opt.filename,
        fileData: base64Data, 
        email: cvData.personal.email,
        name: cvData.personal.name,
        tarih: new Date().toLocaleString('tr-TR')
      };
      
      const apiResult = await postToScriptApis(payload, 1);
      const drivePatch = getApiDrivePatch(apiResult);
      try { localStorage.setItem(`${cvStorageKey}_drive`, JSON.stringify({ ...drivePatch, syncedAt: new Date().toISOString() })); } catch(e) {}
      
      setIsSaved(true);
      addToast('Öz geçmişiniz başarıyla Drive sistemine yüklendi! Şimdi cihazınıza indirebilirsiniz.', 'success');
    } catch(e) {
      console.warn("Bulut senkronizasyonu uyarı/hatası: ", e.message);
      addToast('Bulut sunucusu yanıt vermedi ancak verileriniz tarayıcıya güvenle kaydedildi. PDF indirebilirsiniz.', 'info');
      setIsSaved(true); 
    } finally {
      setIsSavingCloud(false);
    }
  };

  useEffect(() => {
    try { localStorage.setItem(cvStorageKey, JSON.stringify(cvData)); } catch(e) {}
  }, [cvData, cvStorageKey]);

  const handleDownloadPDF = async () => {
    if (!cvData.personal.name) {
      addToast('Lütfen önce adınızı girin.', 'warning');
      return;
    }
    addToast('PDF cihazınıza indiriliyor, lütfen bekleyin...', 'info');
    try {
      const element = document.getElementById('cv-print-area');
      const opt = getCvPdfOptions(element);
      const html2pdfFactory = getHtml2PdfFactory();
      if (!html2pdfFactory) {
        window.print();
        addToast('PDF kütüphanesi yüklenemediği için yazdırma/manuel PDF ekranı açıldı.', 'warning');
        return;
      }
      await html2pdfFactory().from(element).set(opt).save();
      addToast('PDF indirme işlemi başarıyla tamamlandı.', 'success');
    } catch (error) {
      console.warn('PDF İndirme Hatası:', error.message);
      addToast('PDF oluşturulurken bir hata oluştu.', 'error');
    }
  };

  return (
    <div className="flex flex-col lg:flex-row min-h-[calc(100vh-64px)] lg:h-[calc(100vh-64px)] overflow-y-auto lg:overflow-hidden bg-slate-100 dark:bg-dark-bg animate-fade-in">
      <div className="w-full lg:w-[500px] bg-white dark:bg-dark-card border-r border-slate-200 dark:border-dark-border h-auto lg:h-full flex flex-col z-10 shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)] no-print">
        <div className="p-5 border-b border-slate-200 dark:border-dark-border flex justify-between items-center bg-slate-50 dark:bg-slate-900/50 no-select">
          <div>
            <h2 className="font-black text-slate-900 dark:text-white flex items-center gap-2"><i className="fa-solid fa-pen-nib text-brand-500"></i> Öz Geçmiş Editörü</h2>
            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Gerçek Zamanlı Senkronizasyon</p>
          </div>
        </div>

        <CVQualityPanel cvData={cvData} user={user} />

        <div className="flex overflow-x-auto custom-scrollbar border-b border-slate-100 dark:border-dark-border p-2 gap-1 bg-white dark:bg-dark-card shrink-0 no-select">
          {[
            { id: 'personal', icon: 'fa-user', label: 'Kişisel' }, { id: 'experience', icon: 'fa-briefcase', label: 'Deneyim' },
            { id: 'education', icon: 'fa-graduation-cap', label: 'Eğitim' }, { id: 'skills', icon: 'fa-bolt', label: 'Yetenekler' },
            { id: 'certificates', icon: 'fa-award', label: 'Belgeler' }, { id: 'projects', icon: 'fa-diagram-project', label: 'Projeler' },
            { id: 'leadership', icon: 'fa-users-gear', label: 'Temsil' },
            { id: 'design', icon: 'fa-palette', label: 'Tasarım' }
          ].map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap transition-all flex items-center gap-1.5
              ${activeTab === tab.id ? 'bg-slate-900 text-white dark:bg-brand-600' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
              <i className={`fa-solid ${tab.icon}`}></i> {tab.label}
            </button>
          ))}
        </div>

        <div className="flex-1 overflow-y-auto p-5 custom-scrollbar">
          {activeTab === 'personal' && (
            <div className="space-y-4 animate-fade-in">
              <FileDropzone label="Profil Fotoğrafı (Opsiyonel)" name="photo" accept="image/*" icon="fa-camera" colorTheme="brand" fileData={photoInfo} onFileChange={(e) => {
                 setPhotoInfo(e.target.fileObj ? { name: e.target.fileObj.name, size: e.target.fileObj.size } : null);
                 setCvData(p => ({ ...p, personal: { ...p.personal, photoUrl: e.target.base64 }}));
              }} />
              <Input label="Ad Soyad" name="name" value={cvData.personal.name} onChange={handlePersonal} />
              <div className="grid grid-cols-2 gap-4">
                <Input label="E-posta" name="email" value={cvData.personal.email} onChange={handlePersonal} type="email" />
                <Input label="Telefon" name="phone" value={cvData.personal.phone} onChange={handlePersonal} />

                </div>
              </div>
            </div>
          </div>
        </div>

    </div>

};

                      <div key={idx} className="p-4 border border-slate-200 dark:border-slate-700 rounded-xl flex flex-col xl:flex-row xl:items-center justify-between gap-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">

                          <div className="w-12 h-12 bg-brand-50 dark:bg-brand-900/30 rounded-lg flex items-center justify-center overflow-hidden shrink-0 border border-brand-100 dark:border-brand-800">
                            <SafeDriveImage src={sub.logoDriveUrl} alt={`${sub.firmaAdi || 'Firma'} logosu`} />
                          </div>
                          <div className="min-w-0">
                            <h4 className="font-bold text-slate-900 dark:text-white">{sub.firmaAdi}</h4>
                            <p className="text-xs font-semibold text-slate-500 mt-1 leading-relaxed max-w-2xl">{sub.publicInfo || sub.cv || 'Firma tanıtım bilgisi yönetici panelinden eklendiğinde burada görünecek.'}</p>
                            <div className="flex flex-wrap items-center gap-2 mt-2">
                              <Badge color="slate" className="text-[9px]">{getCompanySector(sub)}</Badge>
                              {sub.stantAcacak === 'Evet' && <Badge color="slate" className="text-[9px]">Stand Kurulumu</Badge>}
                              {sub.konusmaci === 'Evet' && <Badge color="brand" className="text-[9px]">Sahnede ({sub.konusmaSaati})</Badge>}
                              {eventSettings.eventMode && sub.masaNo && <Badge color="emerald" className="text-[9px]">Masa/Stant: {sub.masaNo}</Badge>}
                              {eventSettings.eventMode && sub.alan && <Badge color="accent" className="text-[9px]">Alan: {sub.alan}</Badge>}
                            </div>
                             <CompanyMatchReasonCard user={dashboardUser} company={sub} />
                            {sub.konusmaci === 'Evet' && (
                              <div className="mt-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-3 py-2 text-xs font-semibold text-slate-600 dark:text-slate-300 inline-flex flex-wrap gap-2 items-center">
                                <i className="fa-solid fa-microphone text-brand-500"></i>
                                <span>{sub.konusmaciAd || 'Konuşmacı'} · {sub.konusmaciUnvan || 'Kurum temsilcisi'}</span>
                                {sub.speakerLinkedin && <a href={sub.speakerLinkedin} target="_blank" rel="noreferrer" className="text-brand-600 dark:text-brand-300 font-black hover:underline"><i className="fa-brands fa-linkedin mr-1"></i>LinkedIn</a>}
                              </div>
                            )}
                          </div>
                        </div>
                        <Button size="sm" variant={plannerIds.has(getFirmPlanId(sub)) ? 'danger' : 'outline'} onClick={() => toggleFirmPlanner(sub)} icon={plannerIds.has(getFirmPlanId(sub)) ? 'fa-xmark' : 'fa-plus'}>
                          {plannerIds.has(getFirmPlanId(sub)) ? 'Plandan Çıkar' : (role === 'student' ? 'Planıma Ekle' : 'Networke Al')}
                        </Button>
                      </div>
                    ))
                  )}
                </div>
              </Card>
            </div>

            <div className="space-y-6">
              <Card>
                <div className="flex items-center justify-between gap-3 mb-4">
                  <div>
                    <h3 className="font-black text-sm text-slate-900 dark:text-white uppercase tracking-wider">{role === 'student' ? 'Fuar Planım' : 'Network Planım'}</h3>
                    <p className="text-xs font-semibold text-slate-500 mt-1">{role === 'student' ? 'Görüşeceğin firmaları ve hedefini not al.' : 'Takip etmek istediğin firma bağlantılarını sakla.'}</p>
                  </div>
                  <Badge color="brand">{fairPlanner.length}</Badge>
                </div>
                {fairPlanner.length === 0 ? (
                  <div className="rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 p-4 text-sm font-semibold text-slate-500">
                    Henüz firma eklenmedi. Listeden “Planıma Ekle” ile başlayabilirsin.
                  </div>
                ) : (
                  <div className="space-y-3">
                    {fairPlanner.map(item => (
                      <div key={item.id} className="rounded-xl border border-slate-200 dark:border-slate-700 p-3 bg-white dark:bg-dark-card">
                        <div className="flex items-start justify-between gap-3 mb-3">
                          <div>
                            <p className="font-black text-sm text-slate-900 dark:text-white">{item.firmaAdi}</p>
                            <p className="text-[10px] font-bold text-brand-600 dark:text-brand-300 uppercase">{item.year}</p>
                            {(item.masaNo || item.alan) && <p className="text-[10px] font-bold text-slate-500 mt-1">{item.alan || 'Etkinlik alanı'} {item.masaNo ? `· Masa/Stant ${item.masaNo}` : ''}</p>}
                          </div>
                          <button onClick={() => removePlannerItem(item.id)} className="w-8 h-8 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-400 hover:text-rose-500 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                          <select value={item.goal} onChange={e => updatePlannerItem(item.id, 'goal', e.target.value)} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-xs font-bold text-slate-700 dark:text-slate-200 outline-none">
                            <option>CV bırakacağım</option>
                            <option>Staj soracağım</option>
                            <option>İş fırsatı konuşacağım</option>
                            <option>Network kuracağım</option>
                          </select>
                          <select value={item.priority} onChange={e => updatePlannerItem(item.id, 'priority', e.target.value)} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-xs font-bold text-slate-700 dark:text-slate-200 outline-none">
                            <option>Yüksek</option>
                            <option>Orta</option>
                            <option>Düşük</option>
                          </select>
                        </div>
                        <textarea value={item.note || ''} onChange={e => updatePlannerItem(item.id, 'note', e.target.value)} placeholder="Kısa not: soracağım soru, görüşeceğim kişi..." rows="2" className="mt-2 w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-xs font-semibold text-slate-700 dark:text-slate-200 outline-none resize-none"></textarea>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
              <Card className="bg-gradient-to-br from-brand-600 to-brand-800 border-0 text-white relative overflow-hidden">
                <div className="absolute -right-4 -top-4 text-7xl opacity-20 transform rotate-12"><i className="fa-solid fa-file-lines"></i></div>
                <div className="relative z-10">
                  <h3 className="font-bold text-brand-100 mb-2 flex items-center gap-2">Profesyonel Öz Geçmiş Hazırla</h3>
                  <p className="text-sm text-brand-50 mb-4 leading-relaxed">Öz geçmişinizi saniyeler içinde oluşturun ve etkinlik günü mülakatlara hazırlıklı gidin.</p>
                  <Button variant="secondary" full onClick={() => setRoute('cv-builder')}>Hemen Başla</Button>
                </div>
              </Card>
              
              <Card>
                <h3 className="font-black text-sm text-slate-900 dark:text-white uppercase tracking-wider mb-4"><i className="fa-solid fa-calendar-check text-brand-500 mr-2"></i>Yaklaşan Etkinlikler 📅</h3>
                <div className="space-y-4">
                    <div className="flex gap-3 items-start relative pb-4">
                      <div className="w-10 h-10 rounded-lg bg-red-50 text-red-600 flex flex-col items-center justify-center shrink-0 border border-red-100 text-xs font-black leading-none shadow-sm">
                        <span>11</span><span className="text-[9px] uppercase mt-0.5">May</span>
                      </div>
                      <div>
                        <h4 className="text-sm font-bold text-slate-900 dark:text-white">Büyük Kariyer Fuarı</h4>
                        <p className="text-xs text-slate-500 font-medium">İESU Ana Kampüs - Fuaye Alanı</p>
                      </div>
                    </div>
                </div>
              </Card>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const AuthPage = ({ type, setRoute, setUser, language = 'tr' }) => {
  const { addToast } = useToast();
  const [isLoading, setIsLoading] = useState(false);
  const [registerRole, setRegisterRole] = useState('student');
  const [formData, setFormData] = useState({ email: '', password: '', name: '', phone: '', birthDate: '', gender: '', studentNumber: '', department: '', classYear: '', educationType: '', graduationYear: '', employmentStatus: '', doubleMajor: false, minor: false, secondDepartment: '', minorDepartment: '', secondProgramType: '', secondProgramClassYear: '', academicNote: '' });
  const isStudentRegistration = registerRole === 'student';
  const isAlumniRegistration = registerRole === 'alumni';
  const handleRoleChange = (role) => {
    setRegisterRole(role);
    setFormData(prev => ({
      ...prev,
      ...(role === 'student'
        ? { graduationYear: '', employmentStatus: '' }
        : { studentNumber: '', classYear: '', educationType: '', doubleMajor: false, minor: false, secondDepartment: '', minorDepartment: '', secondProgramType: '', secondProgramClassYear: '', academicNote: '' })
    }));
  };

  const handleChange = (e) => {
    const { name, value } = e.target;
    if (name === 'phone') {
      setFormData(p => ({ ...p, phone: formatPhoneNumber(value) }));
    } else if (name === 'birthDate') {
      setFormData(p => ({ ...p, birthDate: formatBirthDate(value) }));
    } else {
      setFormData(p => ({ ...p, [name]: value }));
    }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    const cleanEmail = String(formData.email || '').trim().toLocaleLowerCase('tr-TR');
    const cleanPassword = String(formData.password || '').trim();
    const needsStudentAcademic = type === 'register' && isStudentRegistration;
    const needsAlumniCareer = type === 'register' && isAlumniRegistration;
    if (!cleanEmail || !cleanPassword || (type === 'register' && (!formData.name?.trim() || !formData.phone?.trim() || !formData.birthDate?.trim() || !formData.gender || !formData.department?.trim() || (needsStudentAcademic && !formData.classYear) || (needsAlumniCareer && (!formData.graduationYear?.trim() || !formData.employmentStatus?.trim())) || (needsStudentAcademic && formData.doubleMajor && !formData.secondDepartment?.trim()) || (needsStudentAcademic && formData.minor && !formData.minorDepartment?.trim()) || (needsStudentAcademic && (formData.doubleMajor || formData.minor) && !formData.secondProgramClassYear)))) {
      addToast(isAlumniRegistration ? 'Mezun kaydı için ad soyad, bölüm, mezuniyet yılı, çalışma durumu, telefon, doğum tarihi, cinsiyet, e-posta ve şifre alanlarını doldurun.' : 'Lütfen zorunlu alanları doldurunuz.', 'warning');
      return;
    }

    setIsLoading(true);
    try {
      await new Promise(resolve => setTimeout(resolve, 350)); // Simulate network

      if (type === 'login' && isLocalAdminCredential(formData.email, cleanPassword)) {
        const adminUser = makeAdminSessionUser();
        setUser(adminUser);
        saveActiveSession(adminUser);
        addToast('Yönetim paneline giriş yapıldı.', 'success');
        setRoute('admin-overview');
        setIsLoading(false);
        return;
      }
      
      let usersDb = getRegisteredUsers();

      if (type === 'register') {
        const existingUser = usersDb.find(u => String(u.email || '').toLocaleLowerCase('tr-TR') === cleanEmail);
        if (existingUser) {
           addToast('Bu e-posta adresi ile zaten kayıt olunmuş. Lütfen giriş yapın.', 'error');
           setIsLoading(false);
           return;
        }
        const primaryDepartment = String(formData.department || '').trim();
        const secondDepartment = isStudentRegistration && formData.doubleMajor ? String(formData.secondDepartment || '').trim() : '';
        const minorDepartment = isStudentRegistration && formData.minor ? String(formData.minorDepartment || '').trim() : '';
        const newUser = { 
          id: `${registerRole === 'alumni' ? 'ALM' : 'STD'}-${Date.now()}`,
          name: String(formData.name || '').trim(), 
          role: registerRole, 
          roleTitle: registerRole === 'alumni' ? 'Mezun' : 'Öğrenci', 
          email: cleanEmail, 
          password: cleanPassword,
          phone: String(formData.phone || '').trim(),
          birthDate: String(formData.birthDate || '').trim(),
          gender: formData.gender,
          department: primaryDepartment,
          secondDepartment,
          minorDepartment,
          secondProgramType: isStudentRegistration ? (formData.secondProgramType || (formData.doubleMajor ? 'ÇAP / Çift Anadal' : formData.minor ? 'Yandal' : '')) : '',
          secondProgramClassYear: isStudentRegistration && (formData.doubleMajor || formData.minor) ? formData.secondProgramClassYear : '',
          doubleMajor: isStudentRegistration ? !!formData.doubleMajor : false,
          minor: isStudentRegistration ? !!formData.minor : false,
          classYear: isStudentRegistration ? formData.classYear : '',
          educationType: isStudentRegistration ? formData.educationType : '',
          graduationYear: isAlumniRegistration ? String(formData.graduationYear || '').trim() : '',
          employmentStatus: isAlumniRegistration ? String(formData.employmentStatus || '').trim() : '',
          academicNote: isStudentRegistration ? String(formData.academicNote || '').trim() : '',
          registeredAt: new Date().toISOString(),
          language,
          departments: [primaryDepartment, secondDepartment, minorDepartment].filter(Boolean),
          studentNumber: isStudentRegistration ? String(formData.studentNumber || '').trim() : '',
          sourceScreen: isAlumniRegistration ? 'mezun-kayit-ekrani' : 'ogrenci-kayit-ekrani',
          year: isAlumniRegistration ? String(formData.graduationYear || '').trim() : String(new Date().getFullYear())
        };
        let driveSynced = false;
        const userPayload = { action: 'submitUser', formType: 'user-registration', tarih: new Date().toISOString(), driveRootFolderId: DRIVE_ROOT_FOLDER_ID, ...newUser, password: '' };
        try {
          const apiResult = await postToScriptApis(userPayload, 1);
          const drivePatch = getApiDrivePatch(apiResult);
          driveSynced = true;
          Object.assign(newUser, drivePatch, { driveStatus: drivePatch.driveStatus || 'Drive kaydı tamamlandı', driveSyncedAt: drivePatch.driveSyncedAt || new Date().toLocaleString('tr-TR') });
        } catch(syncError) {
          console.warn('Kullanıcı kaydı Drive tarafına aktarılamadı:', syncError);
          logDriveFailure(userPayload, syncError);
          newUser.driveStatus = 'Drive aktarımı bekliyor';
        }
        usersDb.push(newUser);
        localStorage.setItem('iesu_users_db', JSON.stringify(usersDb));
        setUser(newUser); 
        saveActiveSession(newUser);
        addToast(driveSynced ? 'Kayıt başarılı. Drive kaydı tamamlandı ve sisteme giriş yapıldı.' : 'Kayıt yerel olarak alındı; Drive aktarımı bekliyor. Yönetici panelinden tekrar gönderilebilir.', driveSynced ? 'success' : 'warning'); 
        setRoute(newUser.role);
      } else {
        const loginResult = resolveRegisteredUserLogin(cleanEmail, cleanPassword);
        const user = loginResult.user;
        const companyUser = !user ? resolveCompanyPanelLogin(cleanEmail, cleanPassword) : null;
        if (user) {
           setUser(user); 
           saveActiveSession(user);
           addToast(loginResult.passwordBound ? 'Eski kaydınız bulundu; şifreniz bu girişle eşleştirildi.' : 'Sisteme başarıyla giriş yapıldı.', 'success'); 
           setRoute(user.role);
        } else if (companyUser) {
           setUser(companyUser);
           saveActiveSession(companyUser);
           addToast('Firma özel paneline giriş yapıldı.', 'success');
           setRoute('company-portal');
        } else {
           addToast('E-posta adresi veya şifre hatalı ya da firma panel erişimi kapalı.', 'error');
        }
      }
    } catch (error) {
      addToast(error.message || 'Kimlik doğrulama sırasında bir hata oluştu.', 'error');
    } finally {
      setIsLoading(false);
    }
  };

  return (
    <div className="flex items-center justify-center min-h-[calc(100vh-64px)] p-4 animate-fade-in mesh-bg">
      <Card className="w-full max-w-md relative z-10 shadow-2xl">
        <div className="text-center mb-6 cursor-default">
          <div className="w-16 h-16 bg-brand-100 text-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl shadow-sm">
            <i className={`fa-solid ${type === 'login' ? 'fa-right-to-bracket' : 'fa-user-plus'}`}></i>
          </div>
          <h2 className="text-2xl font-black text-slate-900 dark:text-white">{type === 'login' ? 'Kullanıcı Girişi' : 'Kayıt Formu'}</h2>
          <p className="text-sm font-medium text-slate-500 mt-1">Devam etmek için bilgilerinizi giriniz.</p>
        </div>
        <form onSubmit={handleSubmit} className="space-y-4">
          {type === 'register' && (
            <>
              <div className="grid grid-cols-2 gap-3 mb-2">
                 <label className={`p-3 border-2 rounded-xl flex items-center justify-center font-bold text-sm cursor-pointer transition-colors ${registerRole === 'student' ? 'border-brand-500 bg-brand-50 text-brand-700 dark:bg-brand-900/30' : 'border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300'}`}>
                    <input type="radio" name="roleType" value="student" checked={registerRole === 'student'} onChange={() => handleRoleChange('student')} className="hidden"/> <i className="fa-solid fa-graduation-cap mr-2"/> Öğrenci
                 </label>
                 <label className={`p-3 border-2 rounded-xl flex items-center justify-center font-bold text-sm cursor-pointer transition-colors ${registerRole === 'alumni' ? 'border-brand-500 bg-brand-50 text-brand-700 dark:bg-brand-900/30' : 'border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300'}`}>
                    <input type="radio" name="roleType" value="alumni" checked={registerRole === 'alumni'} onChange={() => handleRoleChange('alumni')} className="hidden"/> <i className="fa-solid fa-briefcase mr-2"/> Mezun
                 </label>
              </div>
              <Input label="Ad Soyad" name="name" value={formData.name} onChange={handleChange} required icon="fa-user" />
              <div className="grid grid-cols-2 gap-4">
                {registerRole === 'student' && <Input label="Öğrenci Numarası" name="studentNumber" value={formData.studentNumber} onChange={handleChange} required icon="fa-id-badge" />}
                <div className={registerRole === 'student' ? '' : 'col-span-2'}>
                   <DepartmentSearchInput name="department" value={formData.department} onChange={handleChange} required placeholder="Bölüm adı yazın: örn. Bilgisayar Mühendisliği" />
                </div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                {registerRole === 'student' ? (
                  <>
                    <div className="space-y-1.5 w-full">
                      <label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider cursor-default">Kaçıncı sınıfsınız? <span className="text-red-500">*</span></label>
                      <select name="classYear" value={formData.classYear} onChange={handleChange} className="w-full bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border focus:border-brand-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white transition-all appearance-none cursor-pointer">
                        <option value="">Seçiniz</option>
                        <option>Hazırlık</option><option>1. sınıf</option><option>2. sınıf</option><option>3. sınıf</option><option>4. sınıf</option><option>Mezun</option><option>Diğer</option>
                      </select>
                    </div>
                    <div className="space-y-1.5 w-full">
                      <label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider cursor-default">Öğrenim Türü</label>
                      <select name="educationType" value={formData.educationType} onChange={handleChange} className="w-full bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border focus:border-brand-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white transition-all appearance-none cursor-pointer">
                        <option value="">Seçiniz</option>
                        <option>Örgün</option><option>İkinci Öğretim</option><option>Uzaktan</option><option>Uluslararası Öğrenci</option>
                      </select>
                    </div>
                  </>
                ) : (
                  <>
                    <Input label="Mezuniyet Yılı" name="graduationYear" value={formData.graduationYear} onChange={handleChange} required icon="fa-calendar-check" placeholder="Örn: 2025" />
                    <Input label="Çalışma Durumu" name="employmentStatus" value={formData.employmentStatus} onChange={handleChange} required icon="fa-briefcase" placeholder="Çalışıyor / İş arıyor" />
                  </>
                )}
              </div>
              {registerRole === 'student' && (
                <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 p-4 space-y-3">
                  <label className="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" name="doubleMajor" checked={!!formData.doubleMajor} onChange={e => setFormData(p => ({ ...p, doubleMajor: e.target.checked, secondDepartment: e.target.checked ? p.secondDepartment : '', secondProgramType: e.target.checked ? (p.secondProgramType || 'ÇAP / Çift Anadal') : (p.minor ? 'Yandal' : ''), secondProgramClassYear: e.target.checked || p.minor ? p.secondProgramClassYear : '' }))} className="mt-1 w-4 h-4 accent-brand-600" />
                    <span>
                      <span className="block text-sm font-black text-slate-900 dark:text-white">Çift anadal yapıyor musunuz?</span>
                      <span className="block text-xs font-semibold text-slate-500 mt-1">Varsa ikinci programınızı seçiniz.</span>
                    </span>
                  </label>
                  {formData.doubleMajor && (
                    <div className="space-y-3 animate-slide-in">
                      <DepartmentSearchInput label="İkinci Bölüm / ÇAP Programı" name="secondDepartment" value={formData.secondDepartment} onChange={handleChange} required icon="fa-layer-group" placeholder="İkinci bölüm adını yazın veya listeden seçin" />
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">

const AdminDepartmentSectorAnalyticsPanel = ({ students = [], alumni = [], submissions = [], surveys = [] }) => {
  const studentDepartmentRows = countBy(students, item => item.department || 'Bölüm girilmedi');
  const classRows = countBy(students, item => item.classYear || 'Sınıf girilmedi');
  const facultyRows = countBy(students, item => item.faculty || getFacultyLabel(item.department));
  const sectorRows = countBy([...students, ...alumni], item => item.sector || inferSectorFromText(`${item.department || ''} ${item.position || ''} ${item.company || ''}`));
  const alumniSectorRows = countBy(alumni, item => item.sector || item.employmentStatus || 'Durum girilmedi');
  const cvByDepartment = studentDepartmentRows.map(row => {
    const deptStudents = students.filter(item => (item.department || 'Bölüm girilmedi') === row.label);
    const completed = deptStudents.filter(item => item.cvData).length;
    return { label: row.label, count: deptStudents.length ? Math.round((completed / deptStudents.length) * 100) : 0 };
  });
  return (
    <div className="space-y-6 animate-fade-in">
      <Card className="bg-gradient-to-br from-slate-950 via-brand-900 to-slate-900 border-0 text-white">
        <Badge color="brand" className="mb-4 bg-white/10 text-white border-white/20">Bölüm ve Sektör Yoğunluk Analizi</Badge>
        <h3 className="text-2xl font-black">Gerçek kayıt oluştuğunda dolan analiz merkezi</h3>
        <p className="text-sm font-semibold text-brand-50/90 mt-2">Sahte sayı kullanılmaz; öğrenci, mezun, CV, anket ve firma kayıtları yoksa kartlar boş durum gösterir.</p>
      </Card>
      <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
        <AdminMiniStat icon="fa-user-graduate" label="Öğrenci" value={students.length} />
        <AdminMiniStat icon="fa-user-tie" label="Mezun" value={alumni.length} color="emerald" />
        <AdminMiniStat icon="fa-file-lines" label="CV Kaydı" value={[...students, ...alumni].filter(item => item.cvData).length} color="amber" />
        <AdminMiniStat icon="fa-square-poll-vertical" label="Anket Yanıtı" value={surveys.length} color="slate" />
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <SimpleBarList title="Bölümlere Göre Öğrenci Yoğunluğu" rows={studentDepartmentRows} icon="fa-layer-group" color="brand" />
        <SimpleBarList title="Sınıflara Göre Dağılım" rows={classRows} icon="fa-chart-column" color="emerald" />
        <SimpleBarList title="Fakülte / MYO Yoğunluğu" rows={facultyRows} icon="fa-school" color="amber" />
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <SimpleBarList title="Bölümlere Göre CV Tamamlama Oranı (%)" rows={cvByDepartment} icon="fa-file-circle-check" color="brand" />
        <SimpleBarList title="Öğrenci / Mezun Sektör İlgisi" rows={sectorRows} icon="fa-briefcase" color="emerald" />
        <SimpleBarList title="Mezun Sektör ve Durum Dağılımı" rows={alumniSectorRows} icon="fa-user-tie" color="amber" />
      </div>
    </div>
  );
};

const AdminSurveyManagementPanel = ({ surveys = [], feedbackForms = [], saveSurveys, saveFeedback }) => {
  const { addToast } = useToast();
  const [selected, setSelected] = useState(null);
  const [filters, setFilters] = useState({ search: '', role: '', classYear: '', date: '', test: 'all' });
  const visible = (surveys || []).filter(item => {
    const haystack = `${item.studentName || ''} ${item.studentEmail || ''} ${item.department || ''} ${item.surveyTitle || ''}`.toLocaleLowerCase('tr-TR');
    if (filters.search && !haystack.includes(filters.search.toLocaleLowerCase('tr-TR'))) return false;
    if (filters.role && item.role !== filters.role) return false;
    if (filters.classYear && item.classYear !== filters.classYear) return false;
    if (filters.test === 'test' && !item.isTest) return false;
    if (filters.test === 'official' && item.isTest) return false;
    return true;
  });
  const classes = getUniqueValues(surveys, item => item.classYear);
  const updateSurvey = (id, patch) => saveSurveys((surveys || []).map(item => item.id === id ? { ...item, ...patch } : item));
  const deleteSurvey = (id) => { saveSurveys((surveys || []).filter(item => item.id !== id)); addToast('Anket yanıtı silindi.', 'info'); };
  const deleteTests = () => { saveSurveys((surveys || []).filter(item => !item.isTest)); addToast('Test anket yanıtları temizlendi.', 'success'); };
  const resetSurveys = () => { if (confirm('Tüm anket yanıtları silinsin mi?')) { saveSurveys([]); addToast('Anket yanıtları sıfırlandı.', 'info'); } };
  const exportDetailed = () => {
    const rows = visible.flatMap(record => (getSurveyAnswerDetails(record).length ? getSurveyAnswerDetails(record) : [{ question: record.answers || '', score: record.average || '' }]).map(detail => [record.tarih, record.studentName, record.studentEmail, record.role, record.department, record.classYear, record.graduationYear, record.surveyTitle, record.average, detail.question, detail.score, record.isTest ? 'Evet' : 'Hayır']));
    downloadCsv('Anket_Yanitlari_Analizleri.csv', ['Tarih','Ad Soyad','E-posta','Rol','Bölüm','Sınıf','Mezuniyet Yılı','Anket','Likert Ortalama','Soru','Cevap/Puan','Test Kaydı'], rows);
    addToast('Anket yanıtları detaylı indirildi.', 'success');
  };
  return (
    <div className="space-y-6 animate-fade-in">
      <Card className="bg-gradient-to-br from-accent-700 to-slate-950 border-0 text-white">
        <Badge color="accent" className="mb-4 bg-white/10 text-white border-white/20">Anket Yönetimi</Badge>
        <h3 className="text-2xl font-black">Anket Tasarımları ve Yanıt Analizleri</h3>
        <p className="text-sm font-semibold text-accent-50/90 mt-2">Yanıtlar; öğrenci/mezun, bölüm, sınıf, tarih, Likert ortalaması, açık uçlu cevap ve test kaydı ayrımıyla yönetilir.</p>
      </Card>
      <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
        <AdminMiniStat icon="fa-square-poll-vertical" label="Anket Yanıtı" value={surveys.length} />
        <AdminMiniStat icon="fa-flask" label="Test Yanıtı" value={surveys.filter(item => item.isTest).length} color="rose" />
        <AdminMiniStat icon="fa-inbox" label="İstek/Şikayet" value={feedbackForms.length} color="amber" />
        <AdminMiniStat icon="fa-star-half-stroke" label="Ortalama" value={surveys.length ? (surveys.reduce((sum, item) => sum + Number(item.average || 0), 0) / surveys.length).toFixed(1) : '0.0'} color="emerald" />
      </div>
      <Card>
        <div className="flex flex-col lg:flex-row lg:items-end justify-between gap-4">
          <div><h3 className="text-xl font-black text-slate-900 dark:text-white">Anket Yanıtları ve Analizleri</h3><p className="text-sm font-semibold text-slate-500 mt-1">Tek tek silme, test işaretleme, toplu temizleme ve dışa aktarma bu alanda yapılır.</p></div>
          <div className="flex flex-wrap gap-2"><Button variant="outline" onClick={exportDetailed} icon="fa-file-excel">Yanıtları Dışa Aktar</Button><Button variant="danger" onClick={deleteTests} icon="fa-trash-can">Test Yanıtlarını Sil</Button><Button variant="outline" onClick={resetSurveys} icon="fa-rotate-left">Anketi Sıfırla</Button></div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-5 gap-3 mt-5">
          <Input placeholder="Ad, e-posta, bölüm, anket ara..." value={filters.search} onChange={e => setFilters(p => ({ ...p, search: e.target.value }))} icon="fa-search" />
          <select value={filters.role} onChange={e => setFilters(p => ({ ...p, role: e.target.value }))} className="bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-3 py-2.5 text-sm font-bold dark:text-white"><option value="">Rol</option><option value="student">Öğrenci</option><option value="alumni">Mezun</option></select>
          <select value={filters.classYear} onChange={e => setFilters(p => ({ ...p, classYear: e.target.value }))} className="bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-3 py-2.5 text-sm font-bold dark:text-white"><option value="">Sınıf</option>{classes.map(item => <option key={item}>{item}</option>)}</select>
          <select value={filters.test} onChange={e => setFilters(p => ({ ...p, test: e.target.value }))} className="bg-white dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-3 py-2.5 text-sm font-bold dark:text-white"><option value="all">Tüm kayıtlar</option><option value="official">Resmi kayıtlar</option><option value="test">Test kayıtları</option></select>
          <Button variant="outline" onClick={() => setFilters({ search: '', role: '', classYear: '', date: '', test: 'all' })} icon="fa-broom">Temizle</Button>
        </div>
      </Card>
      <div className="grid grid-cols-1 xl:grid-cols-[1fr_420px] gap-6">
        <Card>
          <div className="overflow-x-auto custom-scrollbar"><table className="w-full text-left text-sm"><thead className="text-[10px] uppercase tracking-widest text-slate-400 border-b border-slate-200 dark:border-slate-700"><tr><th className="p-3">Yanıtlayan</th><th className="p-3">Bölüm / Sınıf</th><th className="p-3">Anket</th><th className="p-3">Ortalama</th><th className="p-3 text-right">İşlem</th></tr></thead><tbody>{visible.length === 0 ? <tr><td colSpan="5" className="p-6 text-center font-bold text-slate-500">Filtreye uygun anket yanıtı yok.</td></tr> : visible.map(item => (<tr key={item.id} className={`border-b border-slate-100 dark:border-slate-800 ${item.isTest ? 'bg-rose-50/60 dark:bg-rose-900/10' : ''}`}><td className="p-3"><p className="font-black text-slate-900 dark:text-white">{item.studentName || 'Kayıt'}</p><p className="text-xs font-semibold text-slate-500">{item.studentEmail || '-'}</p></td><td className="p-3 text-xs font-bold text-slate-600 dark:text-slate-300">{item.department || '-'}<br/><span className="text-slate-400">{item.classYear || item.graduationYear || '-'}</span></td><td className="p-3 text-xs font-bold text-brand-600 dark:text-brand-300">{item.surveyTitle || 'Anket'}</td><td className="p-3"><Badge color="emerald">{item.average || '-'}</Badge></td><td className="p-3"><div className="flex justify-end gap-2"><Button size="sm" variant="outline" onClick={() => setSelected(item)} icon="fa-eye">Detay</Button><Button size="sm" variant="outline" onClick={() => updateSurvey(item.id, { isTest: !item.isTest })} icon={item.isTest ? 'fa-check' : 'fa-flask'}>{item.isTest ? 'Resmi' : 'Test'}</Button><Button size="sm" variant="danger" onClick={() => deleteSurvey(item.id)} icon="fa-trash-can">Sil</Button></div></td></tr>))}</tbody></table></div>
        </Card>
        <Card>
          <h3 className="font-black text-slate-900 dark:text-white mb-4">Yanıt Detayı</h3>
          {!selected ? <p className="text-sm font-semibold text-slate-500">Bir yanıt seçildiğinde cevap detayları burada açılır.</p> : <div className="space-y-3"><p className="font-black text-slate-900 dark:text-white">{selected.studentName}</p><p className="text-xs font-semibold text-slate-500">{selected.department} · {selected.classYear || selected.graduationYear || '-'}</p>{getSurveyAnswerDetails(selected).map((detail, idx) => (<div key={idx} className="rounded-xl border border-slate-200 dark:border-slate-700 p-3"><p className="text-xs font-bold text-slate-500">{detail.question}</p><Badge color="brand" className="mt-2 inline-flex">{detail.score}</Badge></div>))}</div>}
        </Card>
      </div>
    </div>
  );
};

.masaNo || ''} onChange={e => patchRecord(item, { masaNo: e.target.value })}/><p className="text-[11px] font-bold text-slate-500 mt-2">Şifre: {item.panelPassword || '-'}</p></td><td className="p-3"><Badge color={item.driveStatus === 'Drive kaydı tamamlandı' ? 'emerald' : 'amber'}>{item.driveStatus || 'Bekliyor'}</Badge><a href={item.driveFolderUrl || DRIVE_ROOT_FOLDER_URL} target="_blank" rel="noreferrer" className="block text-xs font-bold text-brand-600 mt-2 hover:underline">Drive’da Aç</a></td><td className="p-3"><div className="flex flex-col items-end gap-2"><Button size="sm" variant="emerald" onClick={() => accept(item)} icon="fa-check">Kabul Et</Button><Button size="sm" variant="outline" onClick={() => markMissing(item)} icon="fa-circle-exclamation">Eksik Bilgi</Button><Button size="sm" variant="danger" onClick={() => reject(item)} icon="fa-ban">Reddet</Button><Button size="sm" variant="outline" onClick={() => retryDrive(item)} icon="fa-cloud-arrow-up">Drive’a Kaydet</Button></div></td></tr>))}</tbody></table></div></Card>

const AdminAssuranceCenterPanel = ({ submissions = [], students = [], alumni = [], fetchSubmissions }) => {
  const { addToast } = useToast();
  const [busy, setBusy] = useState(false);
  const companies = mergeCompanyAdminData(submissions);
  const trusted = companies.map(item => getCompanyTrustProfile(item, companies));
  const healthRows = [
    ...companies.map(item => ({ type: 'Firma', label: item.firmaAdi || '-', moduleName: 'Fuar ve Firma Kayitlari', item })),
    ...students.slice(0, 150).map(item => ({ type: 'Öğrenci', label: item.name || item.email || '-', moduleName: 'Kullanici Kayitlari', item })),
    ...alumni.slice(0, 150).map(item => ({ type: 'Mezun', label: item.name || item.email || '-', moduleName: 'Mezun Havuzu', item }))
  ].map(row => ({ ...row, health: getDriveHealthProfile(row.item) }));
  const missing = healthRows.filter(row => row.health.score < 75);
  const activity = getCompanyActivityLogs().slice(0, 8);
  const repairOne = async (row) => {
    const payload = buildDriveRepairPayload(row.item, row.moduleName);
    try { await postToScriptApis(payload, 1); addToast(`${row.label} için Drive onarımı gönderildi.`, 'success'); }
    catch(e) { logDriveFailure(payload, e); addToast('Drive onarımı kuyruğa alınamadı; hata kaydı oluşturuldu.', 'warning'); }
  };
  const repairAll = async () => {
    setBusy(true);
    try {
      for (const row of missing.slice(0, 25)) await repairOne(row);
      addToast('Eksik görünen kayıtlar için toplu onarım denemesi tamamlandı.', 'success');
      fetchSubmissions?.();
    } finally { setBusy(false); }
  };
  const exportAssurance = () => {
    downloadCsv('Guvence_Merkezi_Raporu.csv', ['Tür','Kayıt','Drive Sağlığı','Eksikler','Güven Puanı','Durum'], healthRows.map(row => { const trust = row.type === 'Firma' ? getCompanyTrustProfile(row.item, companies) : {}; return [row.type,row.label,row.health.score,row.health.missing.join(' | '),trust.score || '',trust.label || '']; }));
    addToast('Güvence merkezi raporu indirildi.', 'success');
  };

const AdminDriveErrorsPanel = () => {

xt-xs font-bold">{item.module}</td><td className="p-3 text-xs font-semibold text-rose-600 max-w-xs">{item.message}</td><td className="p-3"><a href={item.targetFolderUrl || DRIVE_ROOT_FOLDER_URL} target="_blank" rel="noreferrer" className="text-brand-600 text-xs font-bold hover:underline">Drive’da Aç</a></td><td className="p-3 text-right"><Button size="sm" onClick={() => retry(item)} icon="fa-cloud-arrow-up">Tekrar Drive’a Gönder</Button></td></tr>))}</tbody></table></div></Card></div>);

const InternshipLikertTest = ({ user }) => {
  const { addToast } = useToast();
  const [scores, setScores] = useState({});
  const [result, setResult] = useState(null);
  const questions = [
    { id: 'q1', text: 'CV\'m güncel ve başvuruya hazır.' },
    { id: 'q2', text: 'Bölümümle ilgili teknik/mesleki becerilerimi açıklayabiliyorum.' },
    { id: 'q3', text: 'LinkedIn veya portfolyo profilim hazır.' },
    { id: 'q4', text: 'Kendimi 30 saniyede net tanıtabilirim.' },
    { id: 'q5', text: 'Staj yapmak istediğim sektör net.' },
    { id: 'q6', text: 'Staj yapmak istediğim departman net.' },
    { id: 'q7', text: 'Zorunlu staj evrak/SGK sürecini biliyorum.' },
    { id: 'q8', text: 'Mülakat sorularına örneklerle cevap verebilirim.' },
    { id: 'q9', text: 'Kariyer Merkezi\'nden hangi konuda destek alacağımı biliyorum.' },
    { id: 'q10', text: 'Ulusal Staj Programı, Yetenek Kapısı, Kariyer Kapısı ve BTK Akademi gibi fırsatları takip ediyorum.' }
  ];

  const handleSubmit = (e) => {
    e.preventDefault();
    if (Object.keys(scores).length < questions.length) {
      addToast('Lütfen tüm soruları yanıtlayın.', 'error');
      return;
    }
    const total = Object.values(scores).reduce((a, b) => a + b, 0);
    const avg = total / questions.length;
    let level = '';
    let recommendation = '';
    if (avg < 2.5) { level = 'Acil Hazırlık Gerekli'; recommendation = 'CV kliniğine başvur. Kariyer danışmanlığı al.'; }
    else if (avg < 3.5) { level = 'Gelişim Sürecinde'; recommendation = 'BTK Akademi\'den eğitim seç. Yetenek Kapısı profilini tamamla.'; }
    else if (avg < 4.5) { level = 'Başvuruya Yakın'; recommendation = 'Ulusal Staj dönemini takip et. Mülakat provası yap.'; }
    else { level = 'Güçlü Aday'; recommendation = 'Portfolyonu zenginleştir ve firmalarla görüşmelere başla!'; }
    
    setResult({ avg: avg.toFixed(1), level, recommendation });
    
    const payload = {
      id: Date.now().toString(),
      recordType: 'InternshipEvaluation',
      studentId: user.id || user.studentNumber,
      studentName: user.name,
      score: avg,
      level,
      createdAt: new Date().toISOString()
    };
    
    queueForSync({ action: 'submitInternshipEvaluation', data: payload, timestamp: Date.now() });
    addToast('Test sonucunuz kaydedildi.', 'success');
  };

  return (
    <div className="bg-white dark:bg-dark-card rounded-2xl shadow-sm border border-slate-200 dark:border-dark-border p-6 mb-6">
      <h3 className="text-xl font-bold mb-4 text-brand-700 dark:text-brand-400">
        <i className="fa-solid fa-clipboard-question mr-2"></i> 5'li Likert Staj Hazırlık Testi
      </h3>
      {result ? (
        <div className="bg-brand-50 dark:bg-brand-900/20 p-6 rounded-xl text-center">
          <div className="text-4xl font-black text-brand-600 dark:text-brand-400 mb-2">{result.avg} / 5.0</div>
          <div className="text-xl font-bold mb-4">{result.level}</div>
          <p className="text-sm font-medium mb-4">{result.recommendation}</p>
          <Button onClick={() => setResult(null)} variant="outline">Testi Tekrar Çöz</Button>
        </div>
      ) : (
        <form onSubmit={handleSubmit} className="space-y-4">
          {questions.map((q, i) => (
            <div key={q.id} className="border-b border-slate-100 dark:border-slate-800 pb-4">
              <p className="text-sm font-semibold mb-2">{i+1}. {q.text}</p>
              <div className="flex gap-4">
                {[1,2,3,4,5].map(val => (
                  <label key={val} className="flex items-center gap-1 cursor-pointer">
                    <input type="radio" name={q.id} value={val} checked={scores[q.id] === val} onChange={() => setScores({...scores, [q.id]: val})} />
                    <span className="text-xs">{val}</span>
                  </label>
                ))}
              </div>
            </div>
          ))}
          <div className="flex justify-end pt-4">
            <Button type="submit" icon="fa-check" variant="primary">Sonucu Gör</Button>
          </div>
        </form>
      )}
    </div>
  );
};

  const [institutionalSettings, setInstitutionalSettings] = useState(() => getInstitutionalSettings());

    try { 
      const s = localStorage.getItem('site_speaker_slots'); 
      const parsed = s ? JSON.parse(s) : null;
      if (parsed) {
        if (Array.isArray(parsed)) {
          const y = localStorage.getItem('site_event_years');
          const years = normalizeEventYears(y ? JSON.parse(y) : DEFAULT_EVENT_YEARS);
          const obj = {};
          years.forEach(yr => obj[yr] = parsed);
          return obj;
        }
        return parsed;
      }
      return { '2026': INITIAL_SPEAKER_SLOTS, '2027': INITIAL_SPEAKER_SLOTS, '2028': INITIAL_SPEAKER_SLOTS };
    } catch(e) { return { '2026': INITIAL_SPEAKER_SLOTS, '2027': INITIAL_SPEAKER_SLOTS, '2028': INITIAL_SPEAKER_SLOTS }; } 
  });
  
  const [siteTimeSlots, setSiteTimeSlots] = useState(() => { try { const s = localStorage.getItem('site_time_slots'); return ensurePlainObject(s ? JSON.parse(s) : INITIAL_TIME_SLOTS, INITIAL_TIME_SLOTS); } catch(e) { return INITIAL_TIME_SLOTS; } });
  
  const [eventYears, setEventYears] = useState(() => {

    catch(e) { return DEFAULT_EVENT_YEARS; } 
  });

  const updateGlobalSettings = (conf) => { const merged = mergeHeroSettings(conf); setGlobalEventSettings(merged); localStorage.setItem('site_event_settings', JSON.stringify(merged)); };
  const updateInstitutionalSettings = (conf) => { const merged = normalizeInstitutionalSettings(conf || {}); setInstitutionalSettings(merged); saveInstitutionalSettings(merged); applyInstitutionalThemeToDom(merged); };
  const setLanguage = (lang) => {
    const safeLang = lang === 'en' ? 'en' : 'tr';
    setLanguageState(safeLang);
    localStorage.setItem('iesu_language', safeLang);
    localStorage.setItem('iesu_language_confirmed', 'true');
  };
  const setDisplayMode = (mode) => {
    const safeMode = getDisplayModePreset(mode).id;
    setDisplayModeState(safeMode);
    localStorage.setItem('iesu_display_mode', safeMode);
  };
  const cycleDisplayMode = () => {
    const index = DISPLAY_MODE_PRESETS.findIndex(item => item.id === displayMode);
    const next = DISPLAY_MODE_PRESETS[(index + 1 + DISPLAY_MODE_PRESETS.length) % DISPLAY_MODE_PRESETS.length];
    setDisplayMode(next.id);
  };
  const updateSpeakerSlots = (slots) => { setSiteSpeakerSlots(slots); localStorage.setItem('site_speaker_slots', JSON.stringify(slots)); };
  const updateTimeSlots = (slots) => { setSiteTimeSlots(slots); localStorage.setItem('site_time_slots', JSON.stringify(slots)); };
  const updateEventYears = (years) => { const safeYears = normalizeEventYears(years); setEventYears(safeYears); localStorage.setItem('site_event_years', JSON.stringify(safeYears)); };

  useEffect(() => {
    try {
      if (!localStorage.getItem('iesu_display_mode') && institutionalSettings?.visualMode) {
        setDisplayModeState(getDisplayModePreset(institutionalSettings.visualMode).id);

      adminUser: user,
      viewedUser: impersonatedUser

      setImpersonatedUser(null);

  useEffect(() => {

    };
    window.addEventListener('iesu_readonly_blocked', handleReadOnly);
    return () => window.removeEventListener('iesu_readonly_blocked', handleReadOnly);

      document.removeEventListener('mousedown', forceAdminReturn, true);
      document.removeEventListener('click', forceAdminReturn, true);
    };

  const handlePanelRouteChange = useCallback((targetRoute) => {

      setImpersonatedUser(null);
      setImpersonationMode('read-only');
    }
    setRoute(targetRoute);
  }, [user]);


  const applyGraduationTransfer = useCallback(async (source = 'auto') => {
    if (!user || user.role !== 'student') return null;
    const upgraded = transferStudentToAlumni(user, source);
    setUser(upgraded);
    saveActiveSession(upgraded);
    setRoute('alumni');
    try {
      const apiResult = await postToScriptApis({ action: 'updateUserStatus', formType: 'graduation-transfer', ...upgraded, password: '', sourceScreen: 'mezuniyet-kontrolu' }, 1);
      const drivePatch = getApiDrivePatch(apiResult);
      if (Object.keys(drivePatch).length) {
        const patched = { ...upgraded, ...drivePatch, driveStatus: drivePatch.driveStatus || 'Drive kaydı tamamlandı', driveSyncedAt: drivePatch.driveSyncedAt || new Date().toLocaleString('tr-TR') };
        setUser(patched);
        saveActiveSession(patched);
        const users = getRegisteredUsers();
        const key = getProfileKey(upgraded);
        setStoredJson('iesu_users_db', users.map(item => getProfileKey(item) === key ? { ...item, ...patched, password: item.password } : item));
      }
    } catch(e) {
      logDriveFailure({ action: 'updateUserStatus', formType: 'graduation-transfer', ...upgraded, password: '' }, e);
    }
    addToast(source === 'confirmed' ? 'Mezun kaydınız mezun havuzuna aktarıldı.' : 'Mezuniyet süresi dolduğu için kaydınız mezun havuzuna aktarıldı.', 'success');
    return upgraded;
  }, [user, addToast]);

  const fetchSubmissionsData = useCallback(async (silent = false) => {
    if(!silent) setIsLoading(true);
    setFetchError('');
    try {
      const localSubmissions = loadLocalFairSubmissions();
      const localPreview = isLocalPreviewHost();
      const apiResults = [];
      const apiErrors = [];

      for (const apiUrl of getScriptUrls()) {
        try {
          const items = await fetchSubmissionsFromScript(apiUrl);
          apiResults.push(...items);
        } catch (error) {
          apiErrors.push(error.message || String(error));
        }
      }

      if (apiResults.length === 0 && localSubmissions.length === 0 && apiErrors.length > 0) {
        if (localPreview) {
          console.info('Canli veri yerel on izlemede okunamadi; bos yerel veriyle devam ediliyor.', apiErrors);
        } else {
          throw new Error(apiErrors.join(' | '));
        }
      }
      
      let overrides = {}, statuses = {}, publicOverrides = {};
      try { overrides = getStoredObject('iesu_year_overrides', {}); } catch(e){}
      try { statuses = getStoredObject('iesu_status_overrides', {}); } catch(e){}
      try { publicOverrides = getStoredObject('iesu_company_public_overrides', {}); } catch(e){}
      
      const parsedData = apiResults.map(item => ({
         ...item,
         ...(publicOverrides[item.id] || {}),
         year: normalizeSubmissionYear({ ...item, year: overrides[item.id] || item.year }, eventYears, LEGACY_EVENT_YEAR),
         status: statuses[item.id] || 'active'
      }));
      
      const localWithOverrides = localSubmissions.map(item => ({
        ...item,
        ...(publicOverrides[item.id] || {}),
        year: normalizeSubmissionYear({ ...item, year: overrides[item.id] || item.year }, eventYears, LEGACY_EVENT_YEAR),
        status: statuses[item.id] || item.status || 'active'
      }));
      setSubmissions(mergeSubmissionsById(localWithOverrides, parsedData));
      if (apiResults.length > 0 && apiErrors.length > 0) console.warn('Bazı veri kaynakları okunamadı:', apiErrors);
    } catch(err) {
      setFetchError(err.message);
      let publicOverrides = {};
      try { publicOverrides = getStoredObject('iesu_company_public_overrides', {}); } catch(e){}
      setSubmissions(loadLocalFairSubmissions().map(item => ({ ...item, ...(publicOverrides[item.id] || {}), year: normalizeSubmissionYear(item, eventYears, LEGACY_EVENT_YEAR), status: item.status || 'active' })));
    } finally {
      if(!silent) setIsLoading(false);
    }
  }, [eventYears]);

  useEffect(() => { fetchSubmissionsData(); }, [fetchSubmissionsData]);

  useEffect(() => {
    if (!user) return;
    touchActiveSession(user);
    const timeout = SESSION_TIMEOUTS[user.role] || SESSION_TIMEOUTS.student;
    const activityEvents = ['click', 'keydown', 'mousemove', 'touchstart', 'scroll'];
    const markActive = () => touchActiveSession(user);
    activityEvents.forEach(evt => window.addEventListener(evt, markActive, { passive: true }));
    const timer = setInterval(() => {
      try {
        const meta = JSON.parse(sessionStorage.getItem(SESSION_META_KEY) || '{}');
        if (Date.now() - (meta.lastActive || 0) > timeout) {
          clearActiveSession();
          setUser(null);
          setRoute('home');
          addToast('Güvenlik için oturum süreniz doldu. Lütfen tekrar giriş yapın.', 'warning');
        }
      } catch(e) {}
    }, 30000);
    return () => {
      activityEvents.forEach(evt => window.removeEventListener(evt, markActive));
      clearInterval(timer);
    };
  }, [user, addToast]);

  useEffect(() => {
    if (!user || user.role !== 'student') {
      setShowGraduationModal(false);
      return;
    }
    const status = getGraduationAutomationStatus(user);
    if (!status.eligible) {
      setShowGraduationModal(false);
      return;
    }
    if (status.shouldAuto) {
      setShowGraduationModal(false);
      applyGraduationTransfer('auto');
      return;
    }
    markGraduationAsked(user);
    setShowGraduationModal(true);
  }, [user?.email, user?.role, user?.classYear, user?.educationType, user?.department, user?.secondDepartment, applyGraduationTransfer]);

  useEffect(() => {
    const publicRoutes = ['home', 'login', 'register', 'fair-registration', 'company-portal', 'gallery'];
    if (!user && !publicRoutes.includes(route)) {
      setRoute('home');
      return;
    }
    if (!user) return;
    if (route === 'cv-builder' && user.role === 'admin' && impersonatedUser?.role === 'admin') {
      setRoute('admin-cv');
      addToast('Admin hesabı CV oluşturucu yerine CV yönetim alanına yönlendirildi.', 'info');
      return;
    }
    if (route.startsWith('admin-') && user.role !== 'admin') {
      setRoute(user.role || 'home');
      addToast('Bu alan yalnızca yöneticiler içindir.', 'warning');
      return;
    }
    if (route.startsWith('student') && user.role !== 'student' && user.role !== 'admin') {
      setRoute(user.role === 'admin' ? 'admin-overview' : user.role || 'home');
      addToast('Bu alan öğrenci hesabı içindir.', 'warning');
      return;
    }
    if (route.startsWith('alumni') && user.role !== 'alumni' && user.role !== 'admin') {
      setRoute(user.role === 'admin' ? 'admin-overview' : user.role || 'home');
      addToast('Bu alan mezun hesabı içindir.', 'warning');
    }
  }, [user, route, addToast, impersonatedUser]);

  useEffect(() => {
    const root = document.documentElement;
    if (isDark) { root.classList.add('dark'); root.setAttribute('data-theme', 'dark'); root.style.colorScheme = 'dark'; } 
    else { root.classList.remove('dark'); root.setAttribute('data-theme', 'light'); root.style.colorScheme = 'light'; }
    root.setAttribute('data-time-mode', displayMode);
  }, [isDark, displayMode]);

  useEffect(() => {
    document.documentElement.setAttribute('lang', language === 'en' ? 'en' : 'tr');
  }, [language]);

  useEffect(() => {
    applyInstitutionalThemeToDom(institutionalSettings);
  }, [institutionalSettings]);

  const handleAdminLoginSuccess = () => {
    const adminUser = makeAdminSessionUser();
    setUser(adminUser);
    saveActiveSession(adminUser);
    setRoute('admin-overview');
    setShowAdminModal(false);
    addToast('Yönetim paneline güvenli giriş yapıldı.', 'success');
  };

  const renderContent = () => {
    if (route.startsWith('admin-') && user?.role !== 'admin') {
      setTimeout(() => setShowAdminModal(true), 0);
      return (
        <div className="flex-1 flex flex-col items-center justify-center p-12 text-center animate-fade-in no-select">
          <i className="fa-solid fa-lock text-6xl text-slate-300 mb-6"></i>
          <h2 className="text-2xl font-black text-slate-900 dark:text-white mb-2">Yetkili giriş gerekli</h2>
          <p className="text-slate-500 font-medium max-w-md">Yönetici alanı gizli rota üzerinden ve yetkili kullanıcıyla açılır.</p>
        </div>
      );
    }
    if (route.startsWith('admin-')) {
       return <AdminDashboard 
          adminTab={route.replace('admin-', '')} 
          setRoute={handlePanelRouteChange} 
          setImpersonatedUser={setImpersonatedUser}
          setImpersonationMode={setImpersonationMode}
          siteSpeakerSlots={siteSpeakerSlots} 
          updateSpeakerSlots={updateSpeakerSlots} 
          siteTimeSlots={siteTimeSlots} 
          updateTimeSlots={updateTimeSlots} 
          globalEventSettings={globalEventSettings}
          updateGlobalSettings={updateGlobalSettings}
          submissions={submissions} 
          isLoading={isLoading} 
          fetchError={fetchError} 
          fetchSubmissions={fetchSubmissionsData} 
          updateLocalSubmissionsState={setSubmissions}
           eventYears={eventYears}
           updateEventYears={updateEventYears}
           institutionalSettings={institutionalSettings}
           updateInstitutionalSettings={updateInstitutionalSettings}
        />;
    }

    switch (route) {
      case 'home': return <LandingPage setRoute={setRoute} submissions={submissions} user={user} heroSettings={globalEventSettings} openAdmin={() => setShowAdminModal(true)} language={language} institutionalSettings={institutionalSettings} />;
      case 'gallery': return <GalleryPage setRoute={setRoute} />;
      case 'login': case 'register': return <AuthPage type={route} setRoute={setRoute} setUser={setUser} language={language} />;
      case 'student':
      case 'student-internship':
      case 'student-opportunities':
      case 'student-prep':
      case 'student-roadmap':
      case 'student-likert':
      case 'student-certificates':
      case 'student-cap-yandal':
      case 'student-counseling':
      case 'student-surveys':
        return <StudentAlumniDashboard role="student" panelFocus={route} setRoute={setRoute} submissions={submissions} eventYears={eventYears} user={previewUser} globalEventSettings={globalEventSettings} />;
      case 'alumni':
      case 'alumni-mentor':
      case 'alumni-roadmap':
      case 'alumni-employment':
      case 'alumni-surveys':
        return <StudentAlumniDashboard role="alumni" panelFocus={route} setRoute={setRoute} submissions={submissions} eventYears={eventYears} user={previewUser} globalEventSettings={globalEventSettings} />;
      case 'cv-builder': return <CVBuilder user={previewUser} />;
      case 'fair-registration': return <FairRegistrationForm siteSpeakerSlots={siteSpeakerSlots} siteTimeSlots={siteTimeSlots} globalEventSettings={globalEventSettings} eventYears={eventYears} submissions={submissions} setRoute={setRoute} onLocalSubmit={(submission) => setSubmissions(prev => mergeSubmissionsById([submission], prev))} />;
      case 'company-portal': return <AcceptedCompanyPortalPage submissions={submissions} students={getPoolRecords('student')} alumni={getPoolRecords('alumni')} setRoute={setRoute} currentUser={previewUser} />;
      default: return (
        <div className="flex-1 flex flex-col items-center justify-center p-12 text-center animate-fade-in no-select">
          <i className="fa-solid fa-person-digging text-6xl text-slate-300 mb-6 animate-pulse"></i>
          <h2 className="text-2xl font-black text-slate-900 dark:text-white mb-2">Modül Geliştirme Aşamasında</h2>
          <p className="text-slate-500 font-medium max-w-md">Erişmeye çalıştığınız "{route}" paneli otomasyon güncellemeleri için hazırlanıyor.</p>
          <Button onClick={() => setRoute(user ? (user.role === 'admin' ? 'admin-overview' : user.role) : 'home')} className="mt-6" icon="fa-arrow-left">Geri Dön</Button>
        </div>
      );
    }
  };

  const publicLayoutRoutes = ['home', 'login', 'register', 'fair-registration', 'company-portal', 'gallery'];
  const isDashboardLayout = user && (!publicLayoutRoutes.includes(route) || (user.role === 'admin' && route === 'company-portal'));

  return (
    <div className={`flex flex-col min-h-screen w-full transition-colors duration-300 ${isDark ? 'bg-dark-bg' : displayMode === 'sunset' ? 'bg-orange-50' : 'bg-slate-50'}`}>
      <ImpersonationBanner 
        user={route.startsWith('admin-') ? null : impersonatedUser} 
        mode={impersonationMode} 
        setMode={setImpersonationMode} 
        onReturn={handleAdminPanelReturn} 
      />
      <Navbar displayMode={displayMode} cycleDisplayMode={cycleDisplayMode} toggleTheme={cycleDisplayMode} isDark={isDark} user={user} setRoute={setRoute} openAdmin={() => setShowAdminModal(true)} onLogout={handleLogout} language={language} setLanguage={setLanguage} institutionalSettings={institutionalSettings} />
      {showAdminModal && <AdminLoginModal onClose={() => setShowAdminModal(false)} onLogin={handleAdminLoginSuccess} />}
      {showGraduationModal && user?.role === 'student' && (
        <GraduationReviewModal
          user={user}
          onConfirm={() => { setShowGraduationModal(false); applyGraduationTransfer('confirmed'); }}
          onDefer={() => { markGraduationDeferred(user); setShowGraduationModal(false); addToast('Mezuniyet kontrolü gelecek dönem tekrar sorulacak.', 'info'); }}
        />
      )}
      
      {isDashboardLayout ? (
        <div className="flex flex-1 w-full relative">
          <Sidebar currentRoute={route} setRoute={handlePanelRouteChange} role={user.role === 'admin' && route.startsWith('student') ? 'student' : user.role === 'admin' && route.startsWith('alumni') ? 'alumni' : user.role === 'admin' && route === 'company-portal' ? 'company' : user.role} />
          <main className="flex-1 lg:ml-64 w-full h-[calc(100vh-64px)] overflow-y-auto custom-scrollbar relative bg-slate-50/50 dark:bg-dark-bg/50 pb-24 lg:pb-0">
            {renderContent()}
          </main>
        </div>
      ) : (
        <main className="flex-1 w-full relative">
           {renderContent()}
        </main>
      )}
    </div>
  );
};

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('Uygulama hata yakalayıcı:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div className="min-h-screen mesh-bg flex items-center justify-center p-4">
          <div className="bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl shadow-2xl max-w-md w-full p-8 text-center">
            <div className="w-16 h-16 rounded-2xl bg-red-100 dark:bg-red-900/30 text-red-600 flex items-center justify-center mx-auto mb-4 text-3xl">
              <i className="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h1 className="text-2xl font-black text-slate-900 dark:text-white mb-2">Sayfa yenilenmeye ihtiyaç duyuyor</h1>
            <p className="text-sm font-semibold text-slate-500 mb-6">Geçici bir arayüz hatası yakalandı. Verileriniz tarayıcıda korunur.</p>
            <Button onClick={() => window.location.reload()} icon="fa-rotate-right">Sayfayı Yenile</Button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const RootWrapper = () => (<ToastProvider><ErrorBoundary><App /></ErrorBoundary></ToastProvider>);
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<RootWrapper />);



</script>
</body>
</html>
